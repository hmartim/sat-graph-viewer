                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /themes/by-items:
              post:
                tags:
                  - Deterministic Fetch Actions
                summary: Retrieves all Themes associated with a list of Items.
                operationId: getThemesForItems
                description: |
                  Retrieves the distinct set of `Theme`s associated with a given list of `Item` IDs.
                  This is the multi-item counterpart to `getThemesForItem`, optimized for cases where an
                  agent needs to determine the thematic context of multiple items in a single operation.

                  The response is a **flat, deduplicated list** of unique Themes. If an agent needs
                  to know which themes belong to which specific item, it should call `getThemesForItem`
                  per item instead.

                  ### Discussion
                  This action is particularly useful when an agent has already retrieved a set of
                  Items (e.g., via `searchItems` or `getItemAncestors`) and needs to understand their
                  thematic context without issuing one request per item.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        type: object
                        required:
                          - itemIds
                        properties:
                          itemIds:
                            type: array
                            items:
                              $ref: '#/components/schemas/ID'
                            minItems: 1
                            uniqueItems: true
                            description: The list of Item IDs whose associated Themes are requested.
                            example:
                              - urn:lex:br:federal:constituicao:1988-10-05;1988!art6
                              - urn:lex:br:federal:lei:1993-12-08;8742!art1
                responses:
                  '200':
                    description: A deduplicated list of Themes associated with the provided Items. May be empty if none of the Items have thematic classifications.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Theme'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /items/{itemId}/valid-versions:
              get:
                tags:
                  - Temporal Resolution Actions
                summary: Gets all Versions of an Item that were valid at a specific time.
                operationId: getValidVersions
                description: |
                  This function acts as the unified entry point for determining the normative state. It executes
                  a strict temporal query without imposing arbitrary hierarchies between statutory and judicial entities.

                  ### Temporal Query Logic

                  The primitive implements **bi-temporal semantics**, distinguishing between:
                  - **Valid Time** (`time`): When was the legal fact valid in the real world?
                  - **Transaction Time** (`observerTime`): When did the system know about this fact?

                  **Default Behavior (observerTime = null):**
                  Returns the "Current Legal Truth" about the past, considering all events known to the system today,
                  including retroactive annulments (ex tunc). This is the typical mode for legal research.

                  **Historical Mode (observerTime provided):**
                  Returns the "Historical Truth" - what was known at a specific point in time. The system filters the
                  graph, ignoring any legislative or judicial events that occurred after the observer time. This
                  enables reproducing the exact state of legal knowledge available at a past moment.

                  The query returns **all** versions of the Item whose validity interval encompasses the target date
                  (`validityStart <= targetDate < validityEnd`), filtered by the observer's temporal perspective.

                  ### Result Scenarios

                  1. **Statutory Stability**:
                     - If the statute has not been interpreted by a high court, the list returns the single active
                       **Statutory Version**.

                  2. **Interpretive Overlay**:
                     - If a judicial decision has provided a binding interpretation, BOTH versions are returned:
                       - The **Statutory Version** (S-TV) remains active (its `validityInterval` end remains `null`)
                       - The **Interpretive Version** (I-TV) overlays the statutory text
                     - The list returns `[S-TV, I-TV]` (|V_valid| = 2)
                     - The Agent receives both the literal text (for citation/context) and the binding
                       interpretation (for applying the law), while using the *ratio decidendi* from the I-TV.
                     - **Key insight**: Interpretive Actions have `terminatesVersionIds: []`, creating an
                       overlay rather than a replacement.

                  3. **Jurisprudential Divergence**:
                     - In split decisions (e.g., conflicting interpretations by different court panels), multiple
                       Interpretive Versions may be active simultaneously.
                     - The list returns `[S-TV, I-TV₁, I-TV₂, ...]` (|V_valid| ≥ 3)
                     - Agents can inspect the `Action` metadata of each version to identify the specific judicial
                       authority responsible (e.g., "1st Panel" vs "2nd Panel").

                  ### Discussion
                  This endpoint implements pure temporal logic: it queries versions based solely on validity intervals,
                  without additional filtering rules. Multiple versions can coexist simultaneously (overlaying model):
                  - Statutory Versions remain active as authoritative text for citation and general legal context
                  - Interpretive Versions overlay (not replace) statutory text, providing binding interpretations
                  - The agent (application logic) decides how to apply multiple versions to answer specific questions

                  This design ensures the graph remains a neutral, deterministic representation of legal events,
                  with no built-in hierarchical preferences between statutory and judicial norms.

                  ### Bi-temporal Query Examples

                  **Example 1: Current Legal Truth (default — `at` omitted)**
                  ```
                  GET /items/{itemId}/valid-versions
                  ```
                  Returns versions valid right now, considering ALL known events (including retroactive effects).

                  **Example 2: Point-in-Time Legal Truth**
                  ```
                  GET /items/{itemId}/valid-versions?at=2010-01-01
                  ```
                  Returns versions valid on 2010-01-01, considering ALL known events (including a 2018 retroactive
                  annulment). If a law was annulled ex tunc in 2018, it will NOT appear in results.

                  **Example 3: Historical Truth**
                  ```
                  GET /items/{itemId}/valid-versions?at=2010-01-01&observerTime=2010-01-01
                  ```
                  Returns versions valid on 2010-01-01, considering ONLY events known by 2010-01-01. If a law was
                  annulled ex tunc in 2018, it WILL appear in results (the annulment was unknown at the time).

                  **Example 4: Professional Liability Analysis**
                  ```
                  GET /items/{itemId}/valid-versions?at=2015-06-01&observerTime=2015-06-01
                  ```
                  Reproduces the exact legal knowledge available to a lawyer on 2015-06-01, essential for evaluating
                  whether professional advice was reasonable based on information available at the time.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose valid versions are being requested.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      Optional. The specific UTC date-time for which to check validity (Valid Time).
                      If omitted, defaults to the current system time ("now").
                    schema:
                      type: string
                      format: date-time
                    example: '1999-06-01T12:00:00Z'
                  - name: observerTime
                    in: query
                    required: false
                    description: 'Optional. The temporal perspective from which to view the graph (Transaction Time). If omitted, defaults to "now" (current legal truth, including retroactive effects). If provided, the system filters out any Actions that occurred after this time, returning the historical state of knowledge. Use cases: (1) Legal historical research, (2) Professional liability analysis (what could be known at the time?), (3) Reproducing past legal opinions.'
                    schema:
                      type: string
                      format: date-time
                    example: '2015-06-01T12:00:00Z'
                responses:
                  '200':
                    description: Successfully retrieved the Version objects valid at the specified time. Returns an array that may contain one or more versions.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    description: Not Found - Either the Item with the given ID does not exist, or it existed but had no version that was valid at the specified time.
                    content:
                      application/json:
                        schema:
                          $ref: '#/components/schemas/ErrorResponse'
            /items/{itemId}/versions:
              get:
                tags:
                  - Temporal Resolution Actions
                summary: Returns all Versions ever produced for a specific Item, with optional time interval filtering.
                operationId: getItemVersions
                description: |
                  Given an Item ID, this action returns all `Version` objects that have ever been produced for that Item.
                  The returned list is ordered chronologically by `validityStart`, from oldest to most recent.

                  This is a **deterministic action**: Given the same input parameters, it always returns the same set of versions.

                  ### Interval Filtering

                  The optional `startAt` and `endAt` parameters restrict results to versions whose validity period
                  **overlaps** with the specified interval:

                  `validityStart < endAt AND (validityEnd > startAt OR validityEnd IS NULL)`

                  - If `startAt` is omitted, the interval is open-ended at the start (all versions up to `endAt`).
                  - If `endAt` is omitted, the interval extends indefinitely into the future (all versions from `startAt` onwards).
                  - If both are omitted, all versions ever produced for the item are returned.

                  ### Relationship to other endpoints
                  - **`getValidVersions`**: Returns only the version(s) valid at a specific point in time (temporal query). Use this for answering "what is the current state?".
                  - **`getItemVersions`**: Returns every version ever created for the item, with optional interval filtering. Use this for answering "what is the full version history?" or "which versions were valid during a given period?".
                  - **`getItemHistory`**: Returns the `Action` events that produced those versions (causal narrative). Use this for answering "why did each version come to exist?".

                  ### Use Cases
                  - Building a version timeline UI showing all historical states of a provision
                  - Feeding all versions into `compareVersions` for longitudinal textual analysis
                  - Auditing the complete lifecycle of an Item without traversing Actions
                  - Efficiently retrieving only the versions valid during a specific period (e.g., a presidential term)
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique identifier of the Item whose versions are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: startAt
                    in: query
                    required: false
                    description: |
                      Optional. The start of the time interval (UTC date-time, inclusive).
                      If omitted, the interval is open-ended at the start.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                  - name: endAt
                    in: query
                    required: false
                    description: |
                      Optional. The end of the time interval (UTC date-time, inclusive).
                      If omitted, the interval extends indefinitely into the future.
                    schema:
                      type: string
                      format: date-time
                    example: '2014-12-31T23:59:59Z'
                responses:
                  '200':
                    description: Successfully retrieved versions of the Item. Returns an empty array if no versions match the criteria.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects ordered chronologically by validityStart.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/batch-valid-at:
              post:
                tags:
                  - Temporal Resolution Actions
                summary: Gets a batch of valid Versions for multiple Items at a single point in time.
                operationId: getBatchValidVersions
                description: |
                  A batch-optimized version of `getValidVersions`. Given a list of Item IDs, it efficiently retrieves all of their corresponding `Version`s that were valid on a single, specified time.

                  For each Item, this endpoint executes the same bi-temporal query as `getValidVersions`:
                  - **Valid Time** (`at`): When was the legal fact valid?
                  - **Transaction Time** (`observerTime`, optional): From which temporal perspective to view the graph?

                  Returns all versions whose validity interval encompasses the target date (`validityStart <= targetDate < validityEnd`), filtered by the observer's temporal perspective if specified.

                  ### Discussion
                  This action is essential for efficiently reconstructing the state of a complex hierarchical item at a specific point in time. It is designed to be used directly with the output of `enumerateItems` to avoid the "N+1 query problem" for temporal reconstruction.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for retrieving the batch of valid versions.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: ../../schemas/requests/GetBatchValidVersionsRequest.yaml
                responses:
                  '200':
                    description: |
                      A list of the requested valid Version objects. The returned list may be shorter than the input list if some items did not have a valid version at the given time or if the consumer lacked permission. The order of the returned items is not guaranteed.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/entities/Version.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
            /items/{itemId}/children:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns the immediate children of a specific Item.
                operationId: getItemChildren
                description: |
                  Given an Item ID, this action returns the list of its immediate structural children.

                  This is a **deterministic action**: Given the same `itemId`, it will always return
                  the same set of children (the structural hierarchy of Items is stable and timeless).

                  This endpoint is designed for efficient structural navigation without loading
                  potentially large child arrays into every Item response. It is particularly useful
                  for items with many children (e.g., articles with numerous paragraphs or incisos).
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique identifier of the Item whose children are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: Successfully retrieved the children of the Item.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Item objects representing the immediate children.
                          items:
                            $ref: '#/components/schemas/Item'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /items/{itemId}/ancestors:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchical ancestors of a single Item.
                operationId: getItemAncestors
                description: |
                  Navigates the hierarchy upwards from a specific structural `Item` to its parent, grandparent, and so on, up to the root `Work`. This is crucial for retrieving the full contextual path ("breadcrumb") of any given provision.

                  The returned list is **ordered** from the root `Work` down to the immediate parent of the input item. The item itself is excluded from the list.

                  ### Discussion
                  This action is the fundamental tool for contextualization. After a search identifies a relevant item, an agent should use `getItemAncestors` to retrieve its structural path. This allows the generation of richer, context-aware responses, significantly improving the quality and explainability of the final answer.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose ancestors are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: An ordered list of ancestor Item objects, from the root Work down to the immediate parent.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Item objects representing ancestors, ordered from root Work to immediate parent. Excludes the item itself.
                          items:
                            $ref: '#/components/schemas/Item'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /items/{itemId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Gets all Item IDs within the hierarchy of a given Item.
                operationId: getItemHierarchy
                description: |
                  Enumerates and returns **Item IDs** for all items within the structural hierarchy of a specified Item. This is an efficient operation optimized for traversing hierarchies and collecting item references without the overhead of returning full Item objects.

                  ### Use Cases
                  This action is ideal for:
                  - Traversing structural hierarchies to collect all descendant IDs
                  - Building item ID lists for use in other operations (e.g., `/query-actions`, `search-items`)
                  - Efficient batch processing where only IDs are needed
                  - Hierarchical navigation with minimal payload overhead

                  ### Discussion
                  This action's purpose is **structural enumeration and navigation**, not search filtering. It is the correct tool for tasks like collecting all items in a subtree for further processing. For performing content-based searches within a scope, agents should pass the scope's ID directly to the search functions (`searchTextUnits`, `searchItems`), as this is significantly more performant.

                  **Efficiency Note:** Returns only IDs (strings) rather than full Item objects, making it ideal for hierarchical traversal workflows where IDs are subsequently used in batch operations.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique ID of the Item whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: depth
                    in: query
                    required: false
                    description: |
                      Controls traversal depth. If `depth=1`, only direct children are returned. If omitted or negative, all descendants are returned recursively.
                    schema:
                      type: integer
                      default: -1
                responses:
                  '200':
                    description: A list of Item IDs (strings) within the hierarchy, ordered by hierarchical depth and position.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/children:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns the immediate structural children of a specific Version.
                operationId: getVersionChildren
                description: |
                  Given a Version ID, this action returns the list of its immediate structural children
                  (component Versions that comprise this Version).

                  This is a **deterministic action**: Given the same `versionId`, it will always return
                  the same set of children Versions.

                  **Temporal Aggregation:** Under the SAT-Graph's aggregation model, a Version is composed
                  by aggregating the most recent valid versions of all its child components at the time
                  of its creation. Some children may be newly created while others are reused from previous
                  states (unchanged components).

                  This endpoint is designed for efficient structural navigation without loading potentially
                  large child arrays into every Version response.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose children are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: Successfully retrieved the children of the Version.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects representing the immediate structural children.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/parents:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns all structural parent Versions of a specific Version.
                operationId: getVersionParents
                description: |
                  Given a Version ID, this action returns all Version objects that structurally contain
                  this Version as a direct component — i.e., all its parent Versions across the entire graph.

                  **Temporal Reuse:** Under the SAT-Graph's aggregation model, an unchanged child Version
                  can be reused by multiple parent Versions over time. For example, an unchanged paragraph
                  may be a direct component of 100+ different Constitution amendment versions simultaneously
                  present in the graph.

                  **Without `at` (default):** Returns all structural parents across the entire history. This is
                  a fully deterministic operation — given the same `versionId`, it always returns the same set.

                  **With `at`:** Filters the result to only the parent Version(s) that were structurally valid
                  at the specified point in time. This is the single-hop equivalent of `getVersionAncestors`,
                  and is useful when only the immediate parent is needed rather than the full ancestor chain.

                  **Root Versions:** If the Version has no structural parents (i.e., it is a root Work),
                  an empty array is returned.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose parents are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      Optional. A UTC date-time defining the point in time at which to filter the parent Versions.

                      If omitted, all structural parents across the entire history are returned.
                      If provided, only the parent Version(s) that were structurally valid at that moment are returned.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                responses:
                  '200':
                    description: Successfully retrieved the list of parent Versions.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Version'
                          description: All parent Version objects that structurally contain this Version. Empty if this is a root Version.
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/ancestors:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchical ancestors of a single Version at a given point in time.
                operationId: getVersionAncestors
                description: |
                  Navigates the version graph upwards from a specific `Version` to its parent, grandparent, and so on, up to the root Version (the Work snapshot), as they existed at the given point in time (`at`). This is the temporal equivalent of `getItemAncestors`, and is crucial for retrieving the full contextual path ("breadcrumb") of any versioned provision at a specific moment in history.

                  The returned list is **ordered** from the root Version (the Work snapshot) down to the immediate parent of the input Version. The Version itself is excluded from the list.

                  ### Why `at` is required
                  Unlike Items — which are structural and eternal — Versions exist in a temporal graph where a single Version can have multiple parent Versions across different time windows (due to structural reuse under the SAT-Graph aggregation model). Without a temporal anchor, traversing upward would yield a combinatorial set of all ancestors across all of history, which is semantically ambiguous and potentially enormous.

                  The `at` parameter collapses the graph to a single snapshot: only the parent Versions that were structurally valid at that moment are followed, yielding one unambiguous path from root to the Version's immediate parent.

                  ### Discussion
                  This action is the primary tool for temporal contextualization. After `searchTextUnits` returns a relevant result, an agent should use `getVersionAncestors` (with the same `at` used in the search) to retrieve the structural path of that Version at that point in time. This allows the generation of richer, context-aware responses such as "Article 186 was located under Title I, Chapter I of the Civil Code (Lei nº 10.406/2002) as of 2010-01-01."
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose ancestors are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      A UTC date-time defining the point in time at which the ancestor path should be resolved. Defaults to 'now' if omitted.

                      This parameter determines which parent Versions were structurally active at that moment, ensuring the returned path reflects the hierarchy as it existed at that specific instant.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                responses:
                  '200':
                    description: An ordered list of ancestor Version objects, from the root Version (Work snapshot) down to the immediate parent, as valid at `at`.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects representing ancestors, ordered from root Version to immediate parent. Excludes the Version itself.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Gets all Version IDs within the hierarchy of a given Version.
                operationId: getVersionHierarchy
                description: |
                  Enumerates and returns all descendant Version IDs within the structural hierarchy of a specified Version. This is useful for understanding the version tree and tracking how versions relate to each other through their parent-child relationships in the temporal graph.

                  ### Use Cases
                  This action is ideal for:
                  - Traversing version hierarchies to collect all descendant version IDs
                  - Understanding version lineages and structural relationships
                  - Building version ID lists for batch operations (e.g., `getBatchTexts`, `compareVersions`)
                  - Analyzing how versions of nested items evolve together
                  - Efficient batch processing where only version IDs are needed

                  ### Discussion
                  This action's purpose is **structural enumeration and navigation** of the version tree, not version filtering. It provides the agent with a deterministic tool for exploring version relationships, distinct from probabilistic search. A Version can have multiple parent Versions (due to graph optimizations where unchanged versions are reused under multiple parent structures), so the returned set represents all descendants reachable through any parent-child path. For content-based analysis, agents should pass the resulting version IDs to analysis functions like `getBatchTexts` or `compareVersions`, as this is more performant.

                  **Efficiency Note:** Returns only Version ID strings rather than full Version objects, making it ideal for hierarchical traversal workflows where IDs are subsequently used in batch operations.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique ID of the Version whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: depth
                    in: query
                    required: false
                    description: |
                      Controls traversal depth. If `depth=1`, only direct children are returned. If omitted or negative, all descendants are returned recursively.
                    schema:
                      type: integer
                      default: -1
                responses:
                  '200':
                    description: A list of Version IDs (strings) within the hierarchy, ordered by hierarchical depth and position.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /item-types/{itemTypeId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchy (all descendant IDs) for an ItemType in the taxonomy.
                operationId: getItemTypeHierarchy
                description: |
                  Returns a flat list of all descendant ItemType IDs for a given ItemType node in the
                  poly-hierarchical taxonomy, including the requested ItemType ID itself.

                  ### Use Case: Hierarchical Filtering

                  This endpoint is essential for search operations with type-based filtering. When a user
                  specifies a high-level ItemType (e.g., "Normative Component"), the agent needs to include
                  all subtypes (Article, Paragraph, Clause, etc.) in the search filter.

                  **Example Workflow:**
                  ```
                  User: "Find all normative components about social security"

                  Agent:
                  1. Resolve "normative components" → itemTypeId: "normative-component"
                  2. Call getItemTypeHierarchy("normative-component")
                     → ["normative-component", "article", "paragraph", "clause", ...]
                  3. Call searchItems(text="social security", itemTypeIds=[...all descendants...])
                  ```

                  ### Discussion

                  Without this endpoint, agents would need to recursively traverse the taxonomy tree
                  with multiple `getItemType` calls, creating inefficiency and complexity. This single
                  endpoint provides the complete descendant set in one request.

                  The returned list is unordered and includes the root ItemType ID itself, making it
                  ready to use directly in filter parameters.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemTypeId
                    in: path
                    required: true
                    description: The unique ID of the ItemType whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                    example: item-type:normative-component
                responses:
                  '200':
                    description: A list of ItemType IDs (strings) within the hierarchy, including the root ItemType itself.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                        example:
                          - item-type:normative-component
                          - item-type:article
                          - item-type:paragraph
                          - item-type:clause
                          - item-type:item
                          - item-type:subitem
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /themes/{themeId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchy (all descendant IDs) for a Theme in the taxonomy.
                operationId: getThemeHierarchy
                description: |
                  Returns a flat list of all descendant Theme IDs for a given Theme node in the
                  poly-hierarchical taxonomy, including the requested Theme ID itself.

                  ### Use Case: Hierarchical Thematic Filtering

                  This endpoint is essential for search operations with theme-based filtering. When a user
                  specifies a high-level Theme (e.g., "Public Law"), the agent needs to include all
                  sub-themes (Social Security, Tax Law, Administrative Law, etc.) in the search filter.

                  **Example Workflow:**
                  ```
                  User: "Find all items about Public Law"

                  Agent:
                  1. Resolve "Public Law" → themeId: "theme:public-law"
                  2. Call getThemeHierarchy("theme:public-law")
                     → ["theme:public-law", "theme:social-security", "theme:tax-law", ...]
                  3. Call searchItems(themeIds=[...all descendants...])
                  ```

                  ### Discussion

                  Without this endpoint, agents would need to recursively traverse the thematic taxonomy
                  with multiple `getTheme` calls, creating inefficiency and complexity. This single
                  endpoint provides the complete descendant set in one request.

                  The returned list is unordered and includes the root Theme ID itself, making it
                  ready to use directly in filter parameters.

                  **Note on Poly-Hierarchy:** Since Themes can have multiple parents, the descendant
                  set includes all nodes reachable by following any path downward from the root Theme.
                  This may result in larger sets than expected if the taxonomy has significant overlap.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: themeId
                    in: path
                    required: true
                    description: The unique ID of the Theme whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                    example: theme:public-law
                responses:
                  '200':
                    description: A list of Theme IDs (strings) within the hierarchy, including the root Theme itself.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                        example:
                          - theme:public-law
                          - theme:constitutional-law
                          - theme:administrative-law
                          - theme:social-security
                          - theme:tax-law
                          - theme:federal-tax
                          - theme:state-tax
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /query-relations:
              post:
                tags:
                  - Graph Traversal Actions
                summary: Queries for full Relation objects based on complex criteria.
                operationId: getRelations
                description: |
                  A powerful action to query and retrieve complete `Relation` objects based on a variety of criteria, including the anchor entity, predicate, direction, temporal validity, and metadata.

                  ### Discussion
                  This is a low-level, high-precision tool for advanced use cases where the details of the graph's connections are paramount. It allows for complex temporal and structural queries on the relationships themselves.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for the Relation query.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/GetRelationsRequest'
                responses:
                  '200':
                    description: A list of full Relation objects matching the criteria. The list may be empty if no relations are found.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Relation'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /items/{itemId}/history:
              get:
                tags:
                  - Causal Analysis Actions
                summary: Gets the historical timeline of actions for a single Item.
                operationId: getItemHistory
                description: |
                  Provides a complete, ordered timeline of all `Action`s that have affected a given `Item`. The returned list is ordered chronologically from the oldest to the most recent action.

                  ### Discussion
                  This action provides a complete, auditable narrative of an item's evolution. An agent can iterate through the returned list of `Action`s to reconstruct every state transition, accessing the "before" state via `terminatesVersionIds` and the "after" state via `producesVersionIds` for each step.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose history is requested.
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: startTime
                    in: query
                    required: false
                    description: Optional. Filters actions to those that occurred on or after this UTC date-time.
                    schema:
                      type: string
                      format: date-time
                  - name: endTime
                    in: query
                    required: false
                    description: Optional. Filters actions to those that occurred on or before this UTC date-time.
                    schema:
                      type: string
                      format: date-time
                  - name: actionTypes
                    in: query
                    required: false
                    description: Optional. Filters for specific types of actions (e.g., 'Amendment', 'Revocation').
                    schema:
                      type: array
                      items:
                        type: string
                        enum:
                          - Amendment
                          - Revocation
                          - Creation
                          - Repeal
                  - name: granularity
                    in: query
                    required: false
                    description: 'Optional. Filters Actions by hierarchical granularity level. - ''macro'': Returns only top-level macro-events (parentId = null). - ''micro'': Returns only atomic micro-events (parentId != null). - If omitted, returns both macro and micro-events.'
                    schema:
                      type: string
                      enum:
                        - macro
                        - micro
                    example: micro
                responses:
                  '200':
                    description: A time-ordered list of Action objects representing the item's history. The list may be empty if the item has no recorded history.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/relationships/Action.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    $ref: ../../openapi.yaml#/components/responses/NotFound
            /items/{sourceWorkId}/actions-caused:
              get:
                tags:
                  - Causal Analysis Actions
                summary: Retrieves all Actions caused by a specific source Work.
                operationId: getActionsBySource
                description: |
                  An essential action for impact analysis that provides forward causal tracing. Given the ID of a source `Work` (e.g., an amending law), it retrieves all atomic `Action`s authorized by any clause within that Work.

                  The returned list is ordered chronologically by the action's effective date.

                  ### Discussion
                  This action is the logical inverse of `traceCausality`. It traces forwards from a high-level cause to all of its granular effects, answering the critical question: "What did Law X do?".
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: sourceWorkId
                    in: path
                    required: true
                    description: The canonical ID of the source 'Work' (e.g., an amending law).
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: actionTypes
                    in: query
                    required: false
                    description: Optional. Filters for specific types of actions.
                    schema:
                      type: array
                      items:
                        type: string
                        enum:
                          - Amendment
                          - Revocation
                          - Creation
                          - Repeal
                  - name: granularity
                    in: query
                    required: false
                    description: |-
                      Optional. Filters Actions by hierarchical granularity level. - 'macro': Returns only top-level macro-events (parentId = null), representing global
                        legislative acts (e.g., "Promulgation of Constitutional Amendment 26/2000").
                      - 'micro': Returns only atomic micro-events (parentId != null), representing specific
                        transformations (e.g., "Art. 1 of CA 26 modifying Art. 6 of the Constitution").
                      - If omitted, returns both macro and micro-events.
                    schema:
                      type: string
                      enum:
                        - macro
                        - micro
                    example: micro
                  - $ref: ../../openapi.yaml#/components/parameters/DataSourcesParameter
                responses:
                  '200':
                    description: A time-ordered list of Action objects caused by the specified source. The list may be empty.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/relationships/Action.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    $ref: ../../openapi.yaml#/components/responses/NotFound
            /query-actions:
              post:
                tags:
                  - Causal Analysis Actions
                summary: Queries for Action objects based on complex criteria including items, versions, types, and temporal filters.
                operationId: queryActions
                description: |
                  A powerful action to query and retrieve complete `Action` objects based on a variety of criteria, including affected items, produced versions, action types, and temporal validity.

                  This action enables efficient batch retrieval of actions across multiple items and versions, supporting complex impact analysis workflows without needing to call per-item endpoints repeatedly.

                  ### Filtering Logic

                  - **itemIds**: If provided, returns actions that affected any of the specified items
                  - **producesVersionIds**: If provided, returns actions that produced any of the specified versions
                  - **actionTypes**: If provided, filters to only actions of the specified types
                  - **timeInterval**: Filters actions by effective date. If only `startTime` is provided, returns all actions from that date onwards. If only `endTime` is provided, returns all actions up to that date.

                  When multiple filter types are provided, results are the **union** of all matching actions (OR logic).

                  ### Discussion

                  This action is essential for comprehensive impact analysis at scale. Rather than making individual `/items/{itemId}/history` or `/items/{sourceWorkId}/actions-caused` calls, a single `/query-actions` call can retrieve all relevant actions across multiple items and versions, dramatically improving efficiency for temporal and causal analysis workflows.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for the Action query.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/GetActionsRequest'
                responses:
                  '200':
                    description: A time-ordered list of Action objects matching the criteria. The list may be empty if no actions are found.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Action'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /versions/compare:
              get:
                tags:
                  - Analysis Actions
                summary: Performs a structure-aware comparison between two Versions.
                operationId: compareVersions
                description: |
                  Performs a granular, structure-aware comparison between the textual content of two different `Version`s. It highlights additions, deletions, and modifications.

                  ### Discussion
                  This action provides a powerful, server-side analysis that goes beyond a simple textual `diff`. Because the server has access to the full graph structure, it can perform a **structural comparison**, identifying not just changed words but also added or removed components. This transforms the comparison into a true structural impact analysis, fundamental for legal practitioners.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionIdA
                    in: query
                    required: true
                    description: Identifier of the first Version (the 'before' state).
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: versionIdB
                    in: query
                    required: true
                    description: Identifier of the second Version (the 'after' state).
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                responses:
                  '200':
                    description: Successfully generated and returned the text diff report.
                    content:
                      application/json:
                        schema:
                          $ref: ../../schemas/responses/TextDiffReport.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    description: Not Found - One or both of the specified Version IDs could not be found.
                    content:
                      application/json:
                        schema:
                          $ref: ../../openapi.yaml#/components/schemas/ErrorResponse
            /meta/languages:
              get:
                tags:
                  - Introspection & Metadata Actions
                summary: Gets a list of all available language codes in the graph.
                operationId: getAvailableLanguages
                description: |
                  Returns a list of all language codes (IETF BCP 47 format) for which textual content is available in the knowledge graph.

                  ### Discussion
                  This action enables an agent or user interface to dynamically present language options to the user, ensuring that requests are only made for languages that the system actually supports.
                security:
                  - ApiKeyAuth: []
                responses:
                  '200':
                    description: A list of available language codes (BCP 47).
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            type: string
                            pattern: ^[a-zA-Z]{2,3}(?:-[a-zA-Z0-9]+)*$
                            example: pt-BR
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
            /meta/action-types:
              get:
                tags:
                  - Introspection & Metadata Actions
                summary: Gets the list of all supported action types.
                operationId: getSupportedActionTypes
                description: |
                  Returns a list of all legislative action types (e.g., `Amendment`, `Revocation`) recognized by the graph's ontology.

                  ### Discussion
                  This action provides the canonical list of values that can be used in the `actionTypes` filter of other functions like `getItemHistory`. It allows a client application to dynamically build filtering interfaces without hardcoding ontology-specific values.
                security:
                  - ApiKeyAuth: []
                responses:
                  '200':
                    description: A list of supported action type strings.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            type: string
                            pattern: ^[A-Z][a-zA-Z]*$
                            example: Amendment
                          example:
                            - Amendment
                            - Revocation
                            - Creation
                            - Repeal
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
            /item-types/roots:
              get:
                tags:
                  - Introspection & Metadata Actions
                summary: Gets the root nodes of the ItemType taxonomy.
                operationId: getRootItemTypes
                description: |
                  Retrieves a list of all `ItemType` objects that are at the root of the type taxonomy
                  (i.e., types that have no parents).

                  ### Discussion
                  This is the primary action for exploring the ItemType taxonomy. It provides an efficient
                  entry point to the type system, allowing clients to render the top-level types and then
                  "lazy-load" sub-trees by fetching children as needed.

                  **Use Cases:**
                  - Build type selectors in UIs and expand children as needed
                  - Understand the top-level structure of the type system
                  - Initialize type navigation interfaces
                  - Generate documentation of the type hierarchy

                  ### DataSource Filtering
                  Different data sources may maintain their own ItemType taxonomies tailored to their specific
                  document types and organizational structures. The optional `dataSources` parameter allows
                  clients to scope the results to specific data sources, which is particularly useful in
                  federated or multi-tenant scenarios where each institution maintains its own type system.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - $ref: '#/components/parameters/DataSourcesParameter'
                responses:
                  '200':
                    description: A list of root ItemType objects.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ItemType'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /themes/roots:
              get:
                tags:
                  - Introspection & Metadata Actions
                summary: Gets the root nodes of the thematic taxonomy.
                operationId: getRootThemes
                description: |
                  Retrieves a list of all `Theme` objects that are at the root of the thematic taxonomy (i.e., themes that have no parents).

                  ### Discussion
                  This is the primary action for an agent or user interface to begin exploring the thematic ontology. It provides an efficient entry point to the taxonomy, allowing a client to render the top-level themes and then "lazy-load" sub-trees by fetching the children of each theme as needed. This approach is highly performant and scalable, avoiding the "N+1 query problem" that would arise from fetching a flat list of all themes.

                  ### DataSource Filtering
                  Different data sources may maintain their own thematic taxonomies. The optional `dataSources` parameter allows clients to scope the results to specific data sources, which is particularly useful in federated or multi-tenant scenarios.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - $ref: '#/components/parameters/DataSourcesParameter'
                responses:
                  '200':
                    description: A list of the root Theme objects. The list will be empty if no themes are defined.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/entities/Theme.yaml
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
        '401':
          $ref: ../../openapi.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../openapi.yaml#/components/responses/Forbidden
  /item-types/batch-get:
    post:
      tags:
        - Deterministic Fetch Actions
      summary: Gets a batch of ItemType objects by their canonical IDs.
      operationId: getBatchItemTypes
      description: |
        A batch-optimized version of `getItemType`. Given a list of IDs, it efficiently retrieves the full data object for each corresponding `ItemType` in a single request.

        ### Discussion
        This is a fundamental utility action used to hydrate `parentIds`, `childrenIds`, or `allowedPartsIds` references found on an `ItemType` into full objects. It is the primary solution to avoid the "N+1 query problem," where a client would otherwise need to make one API call per ID when expanding the type taxonomy.
      security:
        - ApiKeyAuth: []
      requestBody:
        description: The list of ItemType IDs to retrieve.
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/requests/GetBatchItemTypesRequest.yaml
      responses:
        '200':
          description: |
            A list of the requested ItemType objects. The returned list may be shorter than the input list if some IDs were not found or if the consumer lacked permission. The order of the returned items is not guaranteed to match the input order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../../schemas/entities/ItemType.yaml
        '400':
          openapi: 3.0.3
          info:
            title: SAT-Graph API
            version: 1.0.0
            description: |
              This is the official OpenAPI 3.x specification for the **SAT-Graph API**,
              a formal, auditable interface for querying the Structure-Aware Temporal Graph (SAT-Graph).

              The complete architectural framework is proposed in the paper:
              - **[An Ontology-Driven Graph RAG for Legal Norms: A Structural, Temporal, and Deterministic Approach](https://arxiv.org/abs/2508.00827)**

              ## API Architecture

              This specification implements a **two-layer architecture**:

              ### 1. Canonical Core API (Research Paper)
              The foundational set of actions formally specified in the research paper:
              - SAT-Graph ontology: Item, Version, Action, Theme, TextUnit
              - Temporal reasoning and deterministic retrieval
              - Structural navigation and causal tracing
              - Minimal set of composable primitives

              ### 2. Extended API (Production Enhancements)
              Additional capabilities for production use cases:
              - **Relation System**: Semantic overlay graph for cross-document relationships
                (citations, references, dependencies)
              - **Convenience Operations**: Optimized endpoints for common patterns
              - Implements "Future Directions" outlined in the research paper

              **Design Principle:** Extensions maintain the same guarantees of composability,
              auditability, and verifiability as the canonical core.

              ---

              **Authentication Note:** All endpoints in this API are protected. A valid API Key
              must be sent in the `Authorization` header on every request. Please refer to the
              'securitySchemes' section below for details.

              **Data Scoping Note:** The API serves data from multiple providers, called **DataSources**.
              All requests are automatically scoped to the DataSources granted to your API key.
              Many search functions also provide an optional `dataSources` parameter for more granular filtering.
          components:
            schemas:
              ID:
                $ref: ./schemas/core/ID.yaml
              JSON:
                $ref: ./schemas/core/JSON.yaml
              TimeInterval:
                $ref: ./schemas/core/TimeInterval.yaml
              DataSourcesSchema:
                $ref: ./schemas/common/DataSourcesSchema.yaml
              MetadataFilter:
                $ref: ./schemas/common/MetadataFilter.yaml
              ItemMetadataFilterSchema:
                $ref: ./schemas/common/ItemMetadataFilterSchema.yaml
              ContentQuery:
                $ref: ./schemas/common/ContentQuery.yaml
              Item:
                $ref: ./schemas/entities/Item.yaml
              Version:
                $ref: ./schemas/entities/Version.yaml
              Theme:
                $ref: ./schemas/entities/Theme.yaml
              ItemType:
                $ref: ./schemas/entities/ItemType.yaml
              TextUnit:
                $ref: ./schemas/entities/TextUnit.yaml
              Action:
                $ref: ./schemas/relationships/Action.yaml
              Relation:
                $ref: ./schemas/relationships/Relation.yaml
              SearchItemsRequest:
                $ref: ./schemas/requests/SearchItemsRequest.yaml
              SearchTextUnitsRequest:
                $ref: ./schemas/requests/SearchTextUnitsRequest.yaml
              GetItemHierarchyRequest:
                $ref: ./schemas/requests/GetItemHierarchyRequest.yaml
              GetRelationsRequest:
                $ref: ./schemas/requests/GetRelationsRequest.yaml
              GetBatchActionsRequest:
                $ref: ./schemas/requests/GetBatchActionsRequest.yaml
              GetBatchItemsRequest:
                $ref: ./schemas/requests/GetBatchItemsRequest.yaml
              GetBatchVersionsRequest:
                $ref: ./schemas/requests/GetBatchVersionsRequest.yaml
              GetBatchValidVersionsRequest:
                $ref: ./schemas/requests/GetBatchValidVersionsRequest.yaml
              GetBatchTextUnitsRequest:
                $ref: ./schemas/requests/GetBatchTextUnitsRequest.yaml
              GetBatchItemTypesRequest:
                $ref: ./schemas/requests/GetBatchItemTypesRequest.yaml
              ResolvedItemCandidate:
                $ref: ./schemas/responses/ResolvedItemCandidate.yaml
              ResolvedThemeCandidate:
                $ref: ./schemas/responses/ResolvedThemeCandidate.yaml
              ResolvedItemTypeCandidate:
                $ref: ./schemas/responses/ResolvedItemTypeCandidate.yaml
              SearchResultUnit:
                $ref: ./schemas/responses/SearchResultUnit.yaml
              SearchedItemResult:
                $ref: ./schemas/responses/SearchedItemResult.yaml
              ErrorResponse:
                $ref: ./schemas/responses/ErrorResponse.yaml
              CausalityTrace:
                $ref: ./schemas/responses/CausalityTrace.yaml
              TextDiffReport:
                $ref: ./schemas/responses/TextDiffReport.yaml
              HierarchyResponse:
                $ref: ./schemas/responses/HierarchyResponse.yaml
            parameters:
              DataSourcesParameter:
                name: dataSources
                in: query
                required: false
                description: |
                  **Optional.** A list of identifiers for the DataSources to scope the search.

                  A DataSource is the system or provider where an entity originates (e.g., 'dataSource_Senate'). This parameter allows you to narrow a search to a specific subset of the DataSources you have access to.

                  The API will only return results from DataSources that are both *requested* in this parameter and *granted* to your API key. If this parameter is omitted, the search will run against all DataSources your key is granted to.
                schema:
                  type: array
                  items:
                    type: string
                  uniqueItems: true
                example:
                  - dataSource_A
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: |
                  API Key-based authentication. Each consumer must provide their unique API Key
                  directly in the `Authorization` header for every request.

                  **Example:** `Authorization: YOUR_API_KEY`

                  API Keys can be obtained by contacting the system administrator.
            responses:
              BadRequest:
                description: Bad Request - The request is missing a required parameter, includes an invalid parameter value, or is otherwise malformed.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: INVALID_PARAMETER
                      message: The 'topK' parameter must be a positive integer.
              Unauthorized:
                description: Unauthorized - The request lacks valid authentication credentials. The API Key is missing or invalid.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: UNAUTHORIZED
                      message: Authentication credentials were not provided or are invalid.
              Forbidden:
                description: Forbidden - The server understood the request, but is refusing to fulfill it. The API Key is valid but lacks permission for the requested resource or data source.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: FORBIDDEN_DATASOURCE
                      message: The provided API Key does not have access to the 'dataSource_STF' data source.
              NotFound:
                description: Not Found - The requested resource could not be found.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: RESOURCE_NOT_FOUND
                      message: No Item found with the specified ID.
          security:
            - ApiKeyAuth: []
          paths:
            /items/by-reference:
              $ref: ./paths/discovery/resolve-item-reference.yaml
            /themes/by-reference:
              $ref: ./paths/discovery/resolve-theme-reference.yaml
            /item-types/by-reference:
              $ref: ./paths/discovery/resolve-item-type-reference.yaml
            /items/search:
              $ref: ./paths/discovery/search-items.yaml
            /text-units/search:
              $ref: ./paths/discovery/search-text-units.yaml
            /actions/{actionId}:
              $ref: ./paths/deterministic-fetch/get-action-by-id.yaml
            /items/{itemId}:
              $ref: ./paths/deterministic-fetch/get-item-by-id.yaml
            /relations/{relationId}:
              $ref: ./paths/deterministic-fetch/get-relation-by-id.yaml
            /themes/{themeId}:
              $ref: ./paths/deterministic-fetch/get-theme-by-id.yaml
            /item-types/{itemTypeId}:
              $ref: ./paths/deterministic-fetch/get-item-type-by-id.yaml
            /text-units/{textUnitId}:
              $ref: ./paths/deterministic-fetch/get-text-unit-by-id.yaml
            /versions/{versionId}:
              $ref: ./paths/deterministic-fetch/get-version-by-id.yaml
            /items/batch-get:
              $ref: ./paths/deterministic-fetch/get-batch-items.yaml
            /versions/batch-get:
              $ref: ./paths/deterministic-fetch/get-batch-versions.yaml
            /actions/batch-get:
              $ref: ./paths/deterministic-fetch/get-batch-actions.yaml
            /text-units/batch-get:
              $ref: ./paths/deterministic-fetch/get-batch-text-units.yaml
            /item-types/batch-get:
              $ref: ./paths/deterministic-fetch/get-batch-item-types.yaml
            /versions/{versionId}/text-units:
              get:
                tags:
                  - Deterministic Fetch Actions
                summary: Gets all TextUnits for a Version, optionally filtered by language.
                operationId: getVersionTextUnits
                description: |
                  Deterministically retrieves all `TextUnit` objects associated with a single, known `Version`,
                  optionally filtered by language. Returns all aspects (canonical, summary, description, etc.)
                  available for that Version.

                  This is a direct-access, primary-key-based lookup, not a search operation.

                  ### Discussion
                  This action is fundamentally different from `searchTextUnits`. While the latter is a
                  probabilistic discovery tool, `getVersionTextUnits` is a deterministic fetch. It serves
                  the critical use case where an agent has already identified a specific `Version`
                  (e.g., via `getValidVersions`) and requires its complete textual content.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose TextUnits are requested.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: language
                    in: query
                    required: false
                    description: |
                      Optional. The IETF BCP 47 language code to filter results.
                      If omitted, TextUnits for all available languages are returned.
                    schema:
                      type: string
                      pattern: ^[a-zA-Z]{2,3}(?:-[a-zA-Z0-9]+)*$
                    example: pt-BR
                responses:
                  '200':
                    description: Successfully retrieved the TextUnits for the specified Version.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/TextUnit'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /themes/by-items:
              post:
                tags:
                  - Deterministic Fetch Actions
                summary: Retrieves all Themes associated with a list of Items.
                operationId: getThemesForItems
                description: |
                  Retrieves the distinct set of `Theme`s associated with a given list of `Item` IDs.
                  This is the multi-item counterpart to `getThemesForItem`, optimized for cases where an
                  agent needs to determine the thematic context of multiple items in a single operation.

                  The response is a **flat, deduplicated list** of unique Themes. If an agent needs
                  to know which themes belong to which specific item, it should call `getThemesForItem`
                  per item instead.

                  ### Discussion
                  This action is particularly useful when an agent has already retrieved a set of
                  Items (e.g., via `searchItems` or `getItemAncestors`) and needs to understand their
                  thematic context without issuing one request per item.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        type: object
                        required:
                          - itemIds
                        properties:
                          itemIds:
                            type: array
                            items:
                              $ref: '#/components/schemas/ID'
                            minItems: 1
                            uniqueItems: true
                            description: The list of Item IDs whose associated Themes are requested.
                            example:
                              - urn:lex:br:federal:constituicao:1988-10-05;1988!art6
                              - urn:lex:br:federal:lei:1993-12-08;8742!art1
                responses:
                  '200':
                    description: A deduplicated list of Themes associated with the provided Items. May be empty if none of the Items have thematic classifications.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Theme'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /items/{itemId}/valid-versions:
              get:
                tags:
                  - Temporal Resolution Actions
                summary: Gets all Versions of an Item that were valid at a specific time.
                operationId: getValidVersions
                description: |
                  This function acts as the unified entry point for determining the normative state. It executes
                  a strict temporal query without imposing arbitrary hierarchies between statutory and judicial entities.

                  ### Temporal Query Logic

                  The primitive implements **bi-temporal semantics**, distinguishing between:
                  - **Valid Time** (`time`): When was the legal fact valid in the real world?
                  - **Transaction Time** (`observerTime`): When did the system know about this fact?

                  **Default Behavior (observerTime = null):**
                  Returns the "Current Legal Truth" about the past, considering all events known to the system today,
                  including retroactive annulments (ex tunc). This is the typical mode for legal research.

                  **Historical Mode (observerTime provided):**
                  Returns the "Historical Truth" - what was known at a specific point in time. The system filters the
                  graph, ignoring any legislative or judicial events that occurred after the observer time. This
                  enables reproducing the exact state of legal knowledge available at a past moment.

                  The query returns **all** versions of the Item whose validity interval encompasses the target date
                  (`validityStart <= targetDate < validityEnd`), filtered by the observer's temporal perspective.

                  ### Result Scenarios

                  1. **Statutory Stability**:
                     - If the statute has not been interpreted by a high court, the list returns the single active
                       **Statutory Version**.

                  2. **Interpretive Overlay**:
                     - If a judicial decision has provided a binding interpretation, BOTH versions are returned:
                       - The **Statutory Version** (S-TV) remains active (its `validityInterval` end remains `null`)
                       - The **Interpretive Version** (I-TV) overlays the statutory text
                     - The list returns `[S-TV, I-TV]` (|V_valid| = 2)
                     - The Agent receives both the literal text (for citation/context) and the binding
                       interpretation (for applying the law), while using the *ratio decidendi* from the I-TV.
                     - **Key insight**: Interpretive Actions have `terminatesVersionIds: []`, creating an
                       overlay rather than a replacement.

                  3. **Jurisprudential Divergence**:
                     - In split decisions (e.g., conflicting interpretations by different court panels), multiple
                       Interpretive Versions may be active simultaneously.
                     - The list returns `[S-TV, I-TV₁, I-TV₂, ...]` (|V_valid| ≥ 3)
                     - Agents can inspect the `Action` metadata of each version to identify the specific judicial
                       authority responsible (e.g., "1st Panel" vs "2nd Panel").

                  ### Discussion
                  This endpoint implements pure temporal logic: it queries versions based solely on validity intervals,
                  without additional filtering rules. Multiple versions can coexist simultaneously (overlaying model):
                  - Statutory Versions remain active as authoritative text for citation and general legal context
                  - Interpretive Versions overlay (not replace) statutory text, providing binding interpretations
                  - The agent (application logic) decides how to apply multiple versions to answer specific questions

                  This design ensures the graph remains a neutral, deterministic representation of legal events,
                  with no built-in hierarchical preferences between statutory and judicial norms.

                  ### Bi-temporal Query Examples

                  **Example 1: Current Legal Truth (default — `at` omitted)**
                  ```
                  GET /items/{itemId}/valid-versions
                  ```
                  Returns versions valid right now, considering ALL known events (including retroactive effects).

                  **Example 2: Point-in-Time Legal Truth**
                  ```
                  GET /items/{itemId}/valid-versions?at=2010-01-01
                  ```
                  Returns versions valid on 2010-01-01, considering ALL known events (including a 2018 retroactive
                  annulment). If a law was annulled ex tunc in 2018, it will NOT appear in results.

                  **Example 3: Historical Truth**
                  ```
                  GET /items/{itemId}/valid-versions?at=2010-01-01&observerTime=2010-01-01
                  ```
                  Returns versions valid on 2010-01-01, considering ONLY events known by 2010-01-01. If a law was
                  annulled ex tunc in 2018, it WILL appear in results (the annulment was unknown at the time).

                  **Example 4: Professional Liability Analysis**
                  ```
                  GET /items/{itemId}/valid-versions?at=2015-06-01&observerTime=2015-06-01
                  ```
                  Reproduces the exact legal knowledge available to a lawyer on 2015-06-01, essential for evaluating
                  whether professional advice was reasonable based on information available at the time.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose valid versions are being requested.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      Optional. The specific UTC date-time for which to check validity (Valid Time).
                      If omitted, defaults to the current system time ("now").
                    schema:
                      type: string
                      format: date-time
                    example: '1999-06-01T12:00:00Z'
                  - name: observerTime
                    in: query
                    required: false
                    description: 'Optional. The temporal perspective from which to view the graph (Transaction Time). If omitted, defaults to "now" (current legal truth, including retroactive effects). If provided, the system filters out any Actions that occurred after this time, returning the historical state of knowledge. Use cases: (1) Legal historical research, (2) Professional liability analysis (what could be known at the time?), (3) Reproducing past legal opinions.'
                    schema:
                      type: string
                      format: date-time
                    example: '2015-06-01T12:00:00Z'
                responses:
                  '200':
                    description: Successfully retrieved the Version objects valid at the specified time. Returns an array that may contain one or more versions.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    description: Not Found - Either the Item with the given ID does not exist, or it existed but had no version that was valid at the specified time.
                    content:
                      application/json:
                        schema:
                          $ref: '#/components/schemas/ErrorResponse'
            /items/{itemId}/versions:
              get:
                tags:
                  - Temporal Resolution Actions
                summary: Returns all Versions ever produced for a specific Item, with optional time interval filtering.
                operationId: getItemVersions
                description: |
                  Given an Item ID, this action returns all `Version` objects that have ever been produced for that Item.
                  The returned list is ordered chronologically by `validityStart`, from oldest to most recent.

                  This is a **deterministic action**: Given the same input parameters, it always returns the same set of versions.

                  ### Interval Filtering

                  The optional `startAt` and `endAt` parameters restrict results to versions whose validity period
                  **overlaps** with the specified interval:

                  `validityStart < endAt AND (validityEnd > startAt OR validityEnd IS NULL)`

                  - If `startAt` is omitted, the interval is open-ended at the start (all versions up to `endAt`).
                  - If `endAt` is omitted, the interval extends indefinitely into the future (all versions from `startAt` onwards).
                  - If both are omitted, all versions ever produced for the item are returned.

                  ### Relationship to other endpoints
                  - **`getValidVersions`**: Returns only the version(s) valid at a specific point in time (temporal query). Use this for answering "what is the current state?".
                  - **`getItemVersions`**: Returns every version ever created for the item, with optional interval filtering. Use this for answering "what is the full version history?" or "which versions were valid during a given period?".
                  - **`getItemHistory`**: Returns the `Action` events that produced those versions (causal narrative). Use this for answering "why did each version come to exist?".

                  ### Use Cases
                  - Building a version timeline UI showing all historical states of a provision
                  - Feeding all versions into `compareVersions` for longitudinal textual analysis
                  - Auditing the complete lifecycle of an Item without traversing Actions
                  - Efficiently retrieving only the versions valid during a specific period (e.g., a presidential term)
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique identifier of the Item whose versions are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: startAt
                    in: query
                    required: false
                    description: |
                      Optional. The start of the time interval (UTC date-time, inclusive).
                      If omitted, the interval is open-ended at the start.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                  - name: endAt
                    in: query
                    required: false
                    description: |
                      Optional. The end of the time interval (UTC date-time, inclusive).
                      If omitted, the interval extends indefinitely into the future.
                    schema:
                      type: string
                      format: date-time
                    example: '2014-12-31T23:59:59Z'
                responses:
                  '200':
                    description: Successfully retrieved versions of the Item. Returns an empty array if no versions match the criteria.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects ordered chronologically by validityStart.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/batch-valid-at:
              post:
                tags:
                  - Temporal Resolution Actions
                summary: Gets a batch of valid Versions for multiple Items at a single point in time.
                operationId: getBatchValidVersions
                description: |
                  A batch-optimized version of `getValidVersions`. Given a list of Item IDs, it efficiently retrieves all of their corresponding `Version`s that were valid on a single, specified time.

                  For each Item, this endpoint executes the same bi-temporal query as `getValidVersions`:
                  - **Valid Time** (`at`): When was the legal fact valid?
                  - **Transaction Time** (`observerTime`, optional): From which temporal perspective to view the graph?

                  Returns all versions whose validity interval encompasses the target date (`validityStart <= targetDate < validityEnd`), filtered by the observer's temporal perspective if specified.

                  ### Discussion
                  This action is essential for efficiently reconstructing the state of a complex hierarchical item at a specific point in time. It is designed to be used directly with the output of `enumerateItems` to avoid the "N+1 query problem" for temporal reconstruction.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for retrieving the batch of valid versions.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: ../../schemas/requests/GetBatchValidVersionsRequest.yaml
                responses:
                  '200':
                    description: |
                      A list of the requested valid Version objects. The returned list may be shorter than the input list if some items did not have a valid version at the given time or if the consumer lacked permission. The order of the returned items is not guaranteed.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/entities/Version.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
            /items/{itemId}/children:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns the immediate children of a specific Item.
                operationId: getItemChildren
                description: |
                  Given an Item ID, this action returns the list of its immediate structural children.

                  This is a **deterministic action**: Given the same `itemId`, it will always return
                  the same set of children (the structural hierarchy of Items is stable and timeless).

                  This endpoint is designed for efficient structural navigation without loading
                  potentially large child arrays into every Item response. It is particularly useful
                  for items with many children (e.g., articles with numerous paragraphs or incisos).
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique identifier of the Item whose children are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: Successfully retrieved the children of the Item.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Item objects representing the immediate children.
                          items:
                            $ref: '#/components/schemas/Item'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /items/{itemId}/ancestors:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchical ancestors of a single Item.
                operationId: getItemAncestors
                description: |
                  Navigates the hierarchy upwards from a specific structural `Item` to its parent, grandparent, and so on, up to the root `Work`. This is crucial for retrieving the full contextual path ("breadcrumb") of any given provision.

                  The returned list is **ordered** from the root `Work` down to the immediate parent of the input item. The item itself is excluded from the list.

                  ### Discussion
                  This action is the fundamental tool for contextualization. After a search identifies a relevant item, an agent should use `getItemAncestors` to retrieve its structural path. This allows the generation of richer, context-aware responses, significantly improving the quality and explainability of the final answer.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose ancestors are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: An ordered list of ancestor Item objects, from the root Work down to the immediate parent.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Item objects representing ancestors, ordered from root Work to immediate parent. Excludes the item itself.
                          items:
                            $ref: '#/components/schemas/Item'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /items/{itemId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Gets all Item IDs within the hierarchy of a given Item.
                operationId: getItemHierarchy
                description: |
                  Enumerates and returns **Item IDs** for all items within the structural hierarchy of a specified Item. This is an efficient operation optimized for traversing hierarchies and collecting item references without the overhead of returning full Item objects.

                  ### Use Cases
                  This action is ideal for:
                  - Traversing structural hierarchies to collect all descendant IDs
                  - Building item ID lists for use in other operations (e.g., `/query-actions`, `search-items`)
                  - Efficient batch processing where only IDs are needed
                  - Hierarchical navigation with minimal payload overhead

                  ### Discussion
                  This action's purpose is **structural enumeration and navigation**, not search filtering. It is the correct tool for tasks like collecting all items in a subtree for further processing. For performing content-based searches within a scope, agents should pass the scope's ID directly to the search functions (`searchTextUnits`, `searchItems`), as this is significantly more performant.

                  **Efficiency Note:** Returns only IDs (strings) rather than full Item objects, making it ideal for hierarchical traversal workflows where IDs are subsequently used in batch operations.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The unique ID of the Item whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: depth
                    in: query
                    required: false
                    description: |
                      Controls traversal depth. If `depth=1`, only direct children are returned. If omitted or negative, all descendants are returned recursively.
                    schema:
                      type: integer
                      default: -1
                responses:
                  '200':
                    description: A list of Item IDs (strings) within the hierarchy, ordered by hierarchical depth and position.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/children:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns the immediate structural children of a specific Version.
                operationId: getVersionChildren
                description: |
                  Given a Version ID, this action returns the list of its immediate structural children
                  (component Versions that comprise this Version).

                  This is a **deterministic action**: Given the same `versionId`, it will always return
                  the same set of children Versions.

                  **Temporal Aggregation:** Under the SAT-Graph's aggregation model, a Version is composed
                  by aggregating the most recent valid versions of all its child components at the time
                  of its creation. Some children may be newly created while others are reused from previous
                  states (unchanged components).

                  This endpoint is designed for efficient structural navigation without loading potentially
                  large child arrays into every Version response.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose children are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                responses:
                  '200':
                    description: Successfully retrieved the children of the Version.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects representing the immediate structural children.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/parents:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Returns all structural parent Versions of a specific Version.
                operationId: getVersionParents
                description: |
                  Given a Version ID, this action returns all Version objects that structurally contain
                  this Version as a direct component — i.e., all its parent Versions across the entire graph.

                  **Temporal Reuse:** Under the SAT-Graph's aggregation model, an unchanged child Version
                  can be reused by multiple parent Versions over time. For example, an unchanged paragraph
                  may be a direct component of 100+ different Constitution amendment versions simultaneously
                  present in the graph.

                  **Without `at` (default):** Returns all structural parents across the entire history. This is
                  a fully deterministic operation — given the same `versionId`, it always returns the same set.

                  **With `at`:** Filters the result to only the parent Version(s) that were structurally valid
                  at the specified point in time. This is the single-hop equivalent of `getVersionAncestors`,
                  and is useful when only the immediate parent is needed rather than the full ancestor chain.

                  **Root Versions:** If the Version has no structural parents (i.e., it is a root Work),
                  an empty array is returned.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose parents are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      Optional. A UTC date-time defining the point in time at which to filter the parent Versions.

                      If omitted, all structural parents across the entire history are returned.
                      If provided, only the parent Version(s) that were structurally valid at that moment are returned.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                responses:
                  '200':
                    description: Successfully retrieved the list of parent Versions.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Version'
                          description: All parent Version objects that structurally contain this Version. Empty if this is a root Version.
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/ancestors:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchical ancestors of a single Version at a given point in time.
                operationId: getVersionAncestors
                description: |
                  Navigates the version graph upwards from a specific `Version` to its parent, grandparent, and so on, up to the root Version (the Work snapshot), as they existed at the given point in time (`at`). This is the temporal equivalent of `getItemAncestors`, and is crucial for retrieving the full contextual path ("breadcrumb") of any versioned provision at a specific moment in history.

                  The returned list is **ordered** from the root Version (the Work snapshot) down to the immediate parent of the input Version. The Version itself is excluded from the list.

                  ### Why `at` is required
                  Unlike Items — which are structural and eternal — Versions exist in a temporal graph where a single Version can have multiple parent Versions across different time windows (due to structural reuse under the SAT-Graph aggregation model). Without a temporal anchor, traversing upward would yield a combinatorial set of all ancestors across all of history, which is semantically ambiguous and potentially enormous.

                  The `at` parameter collapses the graph to a single snapshot: only the parent Versions that were structurally valid at that moment are followed, yielding one unambiguous path from root to the Version's immediate parent.

                  ### Discussion
                  This action is the primary tool for temporal contextualization. After `searchTextUnits` returns a relevant result, an agent should use `getVersionAncestors` (with the same `at` used in the search) to retrieve the structural path of that Version at that point in time. This allows the generation of richer, context-aware responses such as "Article 186 was located under Title I, Chapter I of the Civil Code (Lei nº 10.406/2002) as of 2010-01-01."
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique identifier of the Version whose ancestors are to be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: at
                    in: query
                    required: false
                    description: |
                      A UTC date-time defining the point in time at which the ancestor path should be resolved. Defaults to 'now' if omitted.

                      This parameter determines which parent Versions were structurally active at that moment, ensuring the returned path reflects the hierarchy as it existed at that specific instant.
                    schema:
                      type: string
                      format: date-time
                    example: '2010-01-01T00:00:00Z'
                responses:
                  '200':
                    description: An ordered list of ancestor Version objects, from the root Version (Work snapshot) down to the immediate parent, as valid at `at`.
                    content:
                      application/json:
                        schema:
                          type: array
                          description: An array of Version objects representing ancestors, ordered from root Version to immediate parent. Excludes the Version itself.
                          items:
                            $ref: '#/components/schemas/Version'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /versions/{versionId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Gets all Version IDs within the hierarchy of a given Version.
                operationId: getVersionHierarchy
                description: |
                  Enumerates and returns all descendant Version IDs within the structural hierarchy of a specified Version. This is useful for understanding the version tree and tracking how versions relate to each other through their parent-child relationships in the temporal graph.

                  ### Use Cases
                  This action is ideal for:
                  - Traversing version hierarchies to collect all descendant version IDs
                  - Understanding version lineages and structural relationships
                  - Building version ID lists for batch operations (e.g., `getBatchTexts`, `compareVersions`)
                  - Analyzing how versions of nested items evolve together
                  - Efficient batch processing where only version IDs are needed

                  ### Discussion
                  This action's purpose is **structural enumeration and navigation** of the version tree, not version filtering. It provides the agent with a deterministic tool for exploring version relationships, distinct from probabilistic search. A Version can have multiple parent Versions (due to graph optimizations where unchanged versions are reused under multiple parent structures), so the returned set represents all descendants reachable through any parent-child path. For content-based analysis, agents should pass the resulting version IDs to analysis functions like `getBatchTexts` or `compareVersions`, as this is more performant.

                  **Efficiency Note:** Returns only Version ID strings rather than full Version objects, making it ideal for hierarchical traversal workflows where IDs are subsequently used in batch operations.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionId
                    in: path
                    required: true
                    description: The unique ID of the Version whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                  - name: depth
                    in: query
                    required: false
                    description: |
                      Controls traversal depth. If `depth=1`, only direct children are returned. If omitted or negative, all descendants are returned recursively.
                    schema:
                      type: integer
                      default: -1
                responses:
                  '200':
                    description: A list of Version IDs (strings) within the hierarchy, ordered by hierarchical depth and position.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /item-types/{itemTypeId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchy (all descendant IDs) for an ItemType in the taxonomy.
                operationId: getItemTypeHierarchy
                description: |
                  Returns a flat list of all descendant ItemType IDs for a given ItemType node in the
                  poly-hierarchical taxonomy, including the requested ItemType ID itself.

                  ### Use Case: Hierarchical Filtering

                  This endpoint is essential for search operations with type-based filtering. When a user
                  specifies a high-level ItemType (e.g., "Normative Component"), the agent needs to include
                  all subtypes (Article, Paragraph, Clause, etc.) in the search filter.

                  **Example Workflow:**
                  ```
                  User: "Find all normative components about social security"

                  Agent:
                  1. Resolve "normative components" → itemTypeId: "normative-component"
                  2. Call getItemTypeHierarchy("normative-component")
                     → ["normative-component", "article", "paragraph", "clause", ...]
                  3. Call searchItems(text="social security", itemTypeIds=[...all descendants...])
                  ```

                  ### Discussion

                  Without this endpoint, agents would need to recursively traverse the taxonomy tree
                  with multiple `getItemType` calls, creating inefficiency and complexity. This single
                  endpoint provides the complete descendant set in one request.

                  The returned list is unordered and includes the root ItemType ID itself, making it
                  ready to use directly in filter parameters.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemTypeId
                    in: path
                    required: true
                    description: The unique ID of the ItemType whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                    example: item-type:normative-component
                responses:
                  '200':
                    description: A list of ItemType IDs (strings) within the hierarchy, including the root ItemType itself.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                        example:
                          - item-type:normative-component
                          - item-type:article
                          - item-type:paragraph
                          - item-type:clause
                          - item-type:item
                          - item-type:subitem
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /themes/{themeId}/hierarchy:
              get:
                tags:
                  - Structural Navigation Actions
                summary: Retrieves the hierarchy (all descendant IDs) for a Theme in the taxonomy.
                operationId: getThemeHierarchy
                description: |
                  Returns a flat list of all descendant Theme IDs for a given Theme node in the
                  poly-hierarchical taxonomy, including the requested Theme ID itself.

                  ### Use Case: Hierarchical Thematic Filtering

                  This endpoint is essential for search operations with theme-based filtering. When a user
                  specifies a high-level Theme (e.g., "Public Law"), the agent needs to include all
                  sub-themes (Social Security, Tax Law, Administrative Law, etc.) in the search filter.

                  **Example Workflow:**
                  ```
                  User: "Find all items about Public Law"

                  Agent:
                  1. Resolve "Public Law" → themeId: "theme:public-law"
                  2. Call getThemeHierarchy("theme:public-law")
                     → ["theme:public-law", "theme:social-security", "theme:tax-law", ...]
                  3. Call searchItems(themeIds=[...all descendants...])
                  ```

                  ### Discussion

                  Without this endpoint, agents would need to recursively traverse the thematic taxonomy
                  with multiple `getTheme` calls, creating inefficiency and complexity. This single
                  endpoint provides the complete descendant set in one request.

                  The returned list is unordered and includes the root Theme ID itself, making it
                  ready to use directly in filter parameters.

                  **Note on Poly-Hierarchy:** Since Themes can have multiple parents, the descendant
                  set includes all nodes reachable by following any path downward from the root Theme.
                  This may result in larger sets than expected if the taxonomy has significant overlap.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: themeId
                    in: path
                    required: true
                    description: The unique ID of the Theme whose descendants should be retrieved.
                    schema:
                      $ref: '#/components/schemas/ID'
                    example: theme:public-law
                responses:
                  '200':
                    description: A list of Theme IDs (strings) within the hierarchy, including the root Theme itself.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/ID'
                        example:
                          - theme:public-law
                          - theme:constitutional-law
                          - theme:administrative-law
                          - theme:social-security
                          - theme:tax-law
                          - theme:federal-tax
                          - theme:state-tax
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
                  '404':
                    $ref: '#/components/responses/NotFound'
            /query-relations:
              post:
                tags:
                  - Graph Traversal Actions
                summary: Queries for full Relation objects based on complex criteria.
                operationId: getRelations
                description: |
                  A powerful action to query and retrieve complete `Relation` objects based on a variety of criteria, including the anchor entity, predicate, direction, temporal validity, and metadata.

                  ### Discussion
                  This is a low-level, high-precision tool for advanced use cases where the details of the graph's connections are paramount. It allows for complex temporal and structural queries on the relationships themselves.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for the Relation query.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/GetRelationsRequest'
                responses:
                  '200':
                    description: A list of full Relation objects matching the criteria. The list may be empty if no relations are found.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Relation'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /items/{itemId}/history:
              get:
                tags:
                  - Causal Analysis Actions
                summary: Gets the historical timeline of actions for a single Item.
                operationId: getItemHistory
                description: |
                  Provides a complete, ordered timeline of all `Action`s that have affected a given `Item`. The returned list is ordered chronologically from the oldest to the most recent action.

                  ### Discussion
                  This action provides a complete, auditable narrative of an item's evolution. An agent can iterate through the returned list of `Action`s to reconstruct every state transition, accessing the "before" state via `terminatesVersionIds` and the "after" state via `producesVersionIds` for each step.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: itemId
                    in: path
                    required: true
                    description: The canonical ID of the Item whose history is requested.
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: startTime
                    in: query
                    required: false
                    description: Optional. Filters actions to those that occurred on or after this UTC date-time.
                    schema:
                      type: string
                      format: date-time
                  - name: endTime
                    in: query
                    required: false
                    description: Optional. Filters actions to those that occurred on or before this UTC date-time.
                    schema:
                      type: string
                      format: date-time
                  - name: actionTypes
                    in: query
                    required: false
                    description: Optional. Filters for specific types of actions (e.g., 'Amendment', 'Revocation').
                    schema:
                      type: array
                      items:
                        type: string
                        enum:
                          - Amendment
                          - Revocation
                          - Creation
                          - Repeal
                  - name: granularity
                    in: query
                    required: false
                    description: 'Optional. Filters Actions by hierarchical granularity level. - ''macro'': Returns only top-level macro-events (parentId = null). - ''micro'': Returns only atomic micro-events (parentId != null). - If omitted, returns both macro and micro-events.'
                    schema:
                      type: string
                      enum:
                        - macro
                        - micro
                    example: micro
                responses:
                  '200':
                    description: A time-ordered list of Action objects representing the item's history. The list may be empty if the item has no recorded history.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/relationships/Action.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    $ref: ../../openapi.yaml#/components/responses/NotFound
            /items/{sourceWorkId}/actions-caused:
              get:
                tags:
                  - Causal Analysis Actions
                summary: Retrieves all Actions caused by a specific source Work.
                operationId: getActionsBySource
                description: |
                  An essential action for impact analysis that provides forward causal tracing. Given the ID of a source `Work` (e.g., an amending law), it retrieves all atomic `Action`s authorized by any clause within that Work.

                  The returned list is ordered chronologically by the action's effective date.

                  ### Discussion
                  This action is the logical inverse of `traceCausality`. It traces forwards from a high-level cause to all of its granular effects, answering the critical question: "What did Law X do?".
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: sourceWorkId
                    in: path
                    required: true
                    description: The canonical ID of the source 'Work' (e.g., an amending law).
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: actionTypes
                    in: query
                    required: false
                    description: Optional. Filters for specific types of actions.
                    schema:
                      type: array
                      items:
                        type: string
                        enum:
                          - Amendment
                          - Revocation
                          - Creation
                          - Repeal
                  - name: granularity
                    in: query
                    required: false
                    description: |-
                      Optional. Filters Actions by hierarchical granularity level. - 'macro': Returns only top-level macro-events (parentId = null), representing global
                        legislative acts (e.g., "Promulgation of Constitutional Amendment 26/2000").
                      - 'micro': Returns only atomic micro-events (parentId != null), representing specific
                        transformations (e.g., "Art. 1 of CA 26 modifying Art. 6 of the Constitution").
                      - If omitted, returns both macro and micro-events.
                    schema:
                      type: string
                      enum:
                        - macro
                        - micro
                    example: micro
                  - $ref: ../../openapi.yaml#/components/parameters/DataSourcesParameter
                responses:
                  '200':
                    description: A time-ordered list of Action objects caused by the specified source. The list may be empty.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/relationships/Action.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    $ref: ../../openapi.yaml#/components/responses/NotFound
            /query-actions:
              post:
                tags:
                  - Causal Analysis Actions
                summary: Queries for Action objects based on complex criteria including items, versions, types, and temporal filters.
                operationId: queryActions
                description: |
                  A powerful action to query and retrieve complete `Action` objects based on a variety of criteria, including affected items, produced versions, action types, and temporal validity.

                  This action enables efficient batch retrieval of actions across multiple items and versions, supporting complex impact analysis workflows without needing to call per-item endpoints repeatedly.

                  ### Filtering Logic

                  - **itemIds**: If provided, returns actions that affected any of the specified items
                  - **producesVersionIds**: If provided, returns actions that produced any of the specified versions
                  - **actionTypes**: If provided, filters to only actions of the specified types
                  - **timeInterval**: Filters actions by effective date. If only `startTime` is provided, returns all actions from that date onwards. If only `endTime` is provided, returns all actions up to that date.

                  When multiple filter types are provided, results are the **union** of all matching actions (OR logic).

                  ### Discussion

                  This action is essential for comprehensive impact analysis at scale. Rather than making individual `/items/{itemId}/history` or `/items/{sourceWorkId}/actions-caused` calls, a single `/query-actions` call can retrieve all relevant actions across multiple items and versions, dramatically improving efficiency for temporal and causal analysis workflows.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for the Action query.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/GetActionsRequest'
                responses:
                  '200':
                    description: A time-ordered list of Action objects matching the criteria. The list may be empty if no actions are found.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Action'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /versions/compare:
              get:
                tags:
                  - Analysis Actions
                summary: Performs a structure-aware comparison between two Versions.
                operationId: compareVersions
                description: |
                  Performs a granular, structure-aware comparison between the textual content of two different `Version`s. It highlights additions, deletions, and modifications.

                  ### Discussion
                  This action provides a powerful, server-side analysis that goes beyond a simple textual `diff`. Because the server has access to the full graph structure, it can perform a **structural comparison**, identifying not just changed words but also added or removed components. This transforms the comparison into a true structural impact analysis, fundamental for legal practitioners.
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: versionIdA
                    in: query
