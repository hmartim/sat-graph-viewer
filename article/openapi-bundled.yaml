openapi: 3.0.3
info:
  title: SAT-Graph API
  version: 1.0.0
  description: |
    This is the official OpenAPI 3.x specification for the **SAT-Graph API**,
    a formal, auditable interface for querying the Structure-Aware Temporal Graph (SAT-Graph).

    The complete architectural framework is proposed in the paper:
    - **[An Ontology-Driven Graph RAG for Legal Norms: A Structural, Temporal, and Deterministic Approach](https://arxiv.org/abs/2508.00827)**

    ## API Architecture

    This specification implements a **two-layer architecture**:

    ### 1. Canonical Core API (Research Paper)
    The foundational set of actions formally specified in the research paper:
    - SAT-Graph ontology: Item, Version, Action, Theme, TextUnit
    - Temporal reasoning and deterministic retrieval
    - Structural navigation and causal tracing
    - Minimal set of composable primitives

    ### 2. Extended API (Production Enhancements)
    Additional capabilities for production use cases:
    - **Relation System**: Semantic overlay graph for cross-document relationships
      (citations, references, dependencies)
    - **Convenience Operations**: Optimized endpoints for common patterns
    - Implements "Future Directions" outlined in the research paper

    **Design Principle:** Extensions maintain the same guarantees of composability,
    auditability, and verifiability as the canonical core.

    ---

    **Authentication Note:** All endpoints in this API are protected. A valid API Key
    must be sent in the `Authorization` header on every request. Please refer to the
    'securitySchemes' section below for details.

    **Data Scoping Note:** The API serves data from multiple providers, called **DataSources**.
    All requests are automatically scoped to the DataSources granted to your API key.
    Many search functions also provide an optional `dataSources` parameter for more granular filtering.
components:
  schemas:
    ID:
      type: string
      description: A generic, unique identifier for an entity within the SAT-Graph. This ID serves as the primary key for the entity. It is typically a formally structured string, such as a URN or URI, but is not strictly limited to those formats. It must be unique within the knowledge graph.
      minLength: 1
      example: urn:lex:br:federal:constituicao:1988-10-05;1988!art5
    JSON:
      description: Represents any valid JSON value. This can be a structured object, an array, a simple string, a number, a boolean, or null.
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
        - type: 'null'
      examples:
        objectExample:
          summary: A complex JSON object
          value:
            publicationDetails:
              date: '1988-10-05'
              gazette: D.O.U.
        arrayExample:
          summary: A JSON array of tags
          value:
            - tag: social_rights
            - tag: constitution
        stringExample:
          summary: A simple JSON string
          value: Initial version as promulgated.
        numberExample:
          summary: A simple JSON number
          value: 1988
        booleanExample:
          summary: A simple JSON boolean
          value: true
    TimeInterval:
      type: array
      description: |
        Represents a time interval defined by a start date-time and an optional end date-time. All values must conform to the RFC 3339 'date-time' format (e.g., 'YYYY-MM-DDTHH:mm:ssZ').
        **To represent a whole day, use the beginning of that day in UTC.** For example, the date '1988-10-05' should be represented as '1988-10-05T00:00:00Z'.
      minItems: 2
      maxItems: 2
      items:
        type: string
        format: date-time
        nullable: true
      examples:
        closedInterval:
          summary: A closed interval with a start and end time
          description: Used for a version that has been superseded by another.
          value:
            - '1988-10-05T00:00:00Z'
            - '2000-02-13T23:59:59Z'
        openEndedInterval:
          summary: An open-ended interval for a current version
          description: The end time is explicitly null, indicating the version is still legally valid. This is the recommended representation for open intervals.
          value:
            - '2000-02-14T00:00:00Z'
            - null
    DataSourcesSchema:
      type: array
      description: |
        A list of data source identifiers. A data source is the system or provider
        where an entity originates (e.g., 'dataSource_Senate').
      items:
        type: string
      uniqueItems: true
      example:
        - dataSource_A
    MetadataFilter:
      type: object
      description: A structured object for applying metadata-based filters.
      properties:
        itemMetadataFilter:
          type: object
          additionalProperties: true
          description: A set of key-value pairs to filter against the atemporal metadata of an 'Item'. The exact query capabilities (e.g., range queries, existence checks) depend on the backend implementation.
          example:
            jurisdiction: federal
            type: Statute
        versionMetadataFilter:
          type: object
          additionalProperties: true
          description: Key-value pairs to filter against the metadata of the 'Version'.
          example:
            publicationDate:
              '>=': '2010-01-01T00:00:00Z'
    ItemMetadataFilterSchema:
      type: object
      additionalProperties: true
      description: A set of key-value pairs to filter against the atemporal metadata of an 'Item'. The exact query capabilities (e.g., range queries, existence checks) depend on the backend implementation.
      example:
        jurisdiction: federal
        type: Statute
    ContentQuery:
      type: object
      description: |
        A unified query structure for hybrid search that combines semantic (vector) and lexical (full-text) search capabilities.

        This schema leverages Oracle 23ai's native hybrid search with Reciprocal Rank Fusion (RRF), allowing the database to optimally merge and rank results from both semantic and lexical searches in a single operation.

        **Search Strategies:**
        - `hybrid`: Combines both semantic and lexical search with database-managed ranking fusion (default)
        - `semanticOnly`: Uses only vector similarity search
        - `lexicalOnly`: Uses only full-text keyword search

        **Basic Usage:**
        For simple queries, only specify the queryText for the desired search type. The system will apply sensible defaults for weights and operators.

        **Advanced Usage:**
        Fine-tune the search with weights, mandatory clauses, boosting terms, and citation-aware scoring to match complex legal domain requirements.
      properties:
        strategy:
          type: string
          enum:
            - hybrid
            - semanticOnly
            - lexicalOnly
          default: hybrid
          description: |
            The search strategy to employ:
            - `hybrid`: Leverage both semantic and lexical search with RRF (recommended for most use cases)
            - `semanticOnly`: Only perform vector similarity search
            - `lexicalOnly`: Only perform keyword/phrase full-text search
          example: hybrid
        semantic:
          type: object
          description: Configuration for semantic (vector embedding) search
          properties:
            queryText:
              type: string
              description: |
                The natural language query string that will be embedded and used for vector similarity search.
                Use complete sentences or phrases that express the semantic intent.
              example: políticas de garantia de renda mínima para famílias vulneráveis
            weight:
              type: number
              format: float
              minimum: 0
              maximum: 1
              default: 0.5
              description: |
                The relative weight (importance) of the semantic score in hybrid search mode.
                Should sum to 1.0 with lexical.weight for balanced results.
                Higher values prioritize conceptual similarity over exact keyword matches.
              example: 0.7
            topK:
              type: integer
              format: int32
              minimum: 1
              description: |
                Optional. The number of top candidates to retrieve from semantic search before RRF fusion.
                Useful for tuning performance vs. recall trade-offs in large corpora.
              example: 100
          required:
            - queryText
        lexical:
          type: object
          description: Configuration for lexical (full-text keyword) search
          properties:
            queryText:
              type: string
              description: |
                Keywords or phrases for full-text search. Supports exact phrase matching with quotes.
                Examples: "renda básica", "\"artigo 6º\" OR \"artigo 7º\""
              example: '"artigo 6º" OR "renda básica"'
            weight:
              type: number
              format: float
              minimum: 0
              maximum: 1
              default: 0.5
              description: |
                The relative weight of the lexical score in hybrid search mode.
                Should sum to 1.0 with semantic.weight for balanced results.
                Higher values prioritize exact keyword/phrase matches.
              example: 0.3
            topK:
              type: integer
              format: int32
              minimum: 1
              description: |
                Optional. The number of top candidates to retrieve from lexical search before RRF fusion.
              example: 100
          required:
            - queryText
        clauses:
          type: array
          description: |
            Advanced clauses for mandatory, boosting, or exclusion conditions.
            These map directly to Oracle 23ai's MUST_CONTAIN, SHOULD_CONTAIN, and exclusion operators.
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - mustContain
                  - shouldContain
                  - mustNotContain
                description: |
                  - `mustContain`: Results MUST include this term/phrase (filters out non-matching documents)
                  - `shouldContain`: Results containing this term/phrase receive a score boost
                  - `mustNotContain`: Results containing this term/phrase are excluded
                example: mustContain
              text:
                type: string
                description: The term or phrase for this clause. Use quotes for exact phrases.
                example: Constituição Federal
              boost:
                type: number
                format: float
                minimum: 0
                default: 1.5
                description: |
                  Score multiplier for `shouldContain` clauses. Ignored for other clause types.
                  Values > 1.0 increase relevance; values < 1.0 decrease it.
                example: 2
            required:
              - type
              - text
          example:
            - type: mustContain
              text: Constituição Federal
            - type: shouldContain
              text: direitos sociais
              boost: 1.8
        citationBoost:
          type: object
          description: |
            Optional. Boost results containing legal citations (e.g., "artigo 6º", "Lei 8.742/1993").
            Particularly useful in legal/constitutional domains where cited documents carry more authority.
          properties:
            enabled:
              type: boolean
              default: false
              description: Whether to enable citation-aware scoring
            multiplier:
              type: number
              format: float
              minimum: 1
              default: 1.5
              description: Score multiplier for documents containing detected legal citations
              example: 1.8
            patterns:
              type: array
              items:
                type: string
              description: |
                Optional. Custom regex patterns to detect citations beyond the defaults.
                Default patterns include: "artigo \d+", "Lei \d+", "§ \d+", etc.
              example:
                - CF/\d{2}
                - Decreto \d+
      anyOf:
        - required:
            - semantic
        - required:
            - lexical
      example:
        strategy: hybrid
        semantic:
          queryText: políticas de garantia de renda mínima para famílias vulneráveis
          weight: 0.7
        lexical:
          queryText: '"artigo 6º" OR "renda básica"'
          weight: 0.3
        clauses:
          - type: mustContain
            text: Constituição Federal
    Item:
      type: object
      description: |
        Represents a timeless, foundational entity within the SAT Graph. An 'Item' acts as a stable, version-agnostic anchor for a specific concept.
        While its primary role is to model the formal structure of a document (as a 'Work' or 'Work Component'), it is flexible enough to represent other key entities, such as: - **Abstract Concepts:** A legal or procedural concept (e.g., 'Revocation', 'Due Process'). - **Named Entities:** A real-world entity like an organization or location (e.g., 'National Congress').
        The 'Item' itself is just a structural and conceptual anchor. Its semantic meaning and textual content are provided by associated 'TextUnit' objects, typically with an aspect like 'description', 'summary'.
      required:
        - id
        - typeId
        - label
      properties:
        id:
          $ref: ../core/ID.yaml
          description: 'The primary, opaque identifier for this Item. The field is a string with no format restriction, allowing each implementation to choose the most appropriate strategy: UUIDs for distributed systems, deterministic hashes, or even the URN itself for simplified implementations. In the examples of this specification, the id field is populated with the URN to facilitate reading and manual tracing of relationships in JSON objects.'
        urn:
          type: string
          nullable: true
          description: The persistent semantic identifier in the URN LEX standard (e.g., urn:lex:br:federal:constituicao:1988-10-05;art5). Represents the ontological identity of the norm, independent of its location or implementation, serving as the key for deduplication and interoperability between systems.
          minLength: 1
          example: urn:lex:br:federal:constituicao:1988-10-05;1988!art5
        url:
          type: string
          format: uri
          nullable: true
          description: The canonical electronic address (Dereferenceable URI) pointing to the official source of the text (e.g., Portal do Planalto or LexML). This field is used exclusively for human user interface (access provenance), not for logical inferences by the agent.
          minLength: 1
          example: https://normas.leg.br/?urn=urn:lex:br:federal:constituicao:1988-10-05;1988!art5
        typeId:
          $ref: ../core/ID.yaml
          description: |-
            The unique identifier of the ItemType that classifies this item. This references an ItemType entity that defines the formal type within the taxonomy (e.g., "Constitution", "Article", "Paragraph").
            The ItemType taxonomy enables validation, navigation, and rich metadata about type relationships and constraints.
          example: article
        label:
          type: string
          description: The human-readable label or title for the item.
          minLength: 1
          example: Brazilian Constitution of 1988
        parentId:
          $ref: ../core/ID.yaml
          nullable: true
          description: The canonical ID of the single structural parent of this item. This field is primarily relevant for 'Concept Component' items to define the document hierarchy. For other categories like 'Abstract Concept', it may be used to build a taxonomy.
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data. Used for storing structured, atemporal properties of the item, such as jurisdiction, publication data, or other domain-specific attributes that don't fit into the other fields.

            **Best Practice:** Use internationally recognized vocabularies such as schema.org (particularly schema.org/Legislation for legal norms) to enable semantic interoperability and zero-shot understanding by AI agents. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for detailed guidance and examples.

            This approach is exemplified in: [Legal Knowledge Graph Foundations, Part-I: URI-Addressable Abstract Works (LRMoo F1 to schema.org)](https://arxiv.org/abs/2508.00827).
    Version:
      type: object
      description: |
        Represents a specific, time-bound version of an Item (a TV/CTV). It captures the semantic state and structural position of an item at a specific point in time, but is language-agnostic and contains no direct textual content.
      required:
        - id
        - itemId
        - type
        - validityInterval
      properties:
        id:
          $ref: ../core/ID.yaml
          description: 'The primary, opaque identifier for this Version instance. The field is a string with no format restriction, allowing each implementation to choose the most appropriate strategy: UUIDs for distributed systems, deterministic hashes, or even the URN itself for simplified implementations. In the examples of this specification, the id field is populated with the URN to facilitate reading and manual tracing of relationships in JSON objects.'
          example: urn:lex:br:federal:constituicao:1988@1988-10-05
        urn:
          type: string
          nullable: true
          description: The persistent semantic identifier in the URN LEX standard, typically extending the Item's URN with temporal information (e.g., @2020-01-15 suffix). Represents the ontological identity of this specific version, enabling precise temporal citations and version tracking across systems for interoperability.
          minLength: 1
          example: urn:lex:br:federal:constituicao:1988-10-05;1988@2020-01-15!art5
        url:
          type: string
          format: uri
          nullable: true
          description: The canonical electronic address (Dereferenceable URI) pointing to the official source of this specific version's text. This field is used exclusively for human user interface (access provenance), not for logical inferences by the agent.
          minLength: 1
          example: https://normas.leg.br/?urn=urn:lex:br:federal:constituicao:1988-10-05;1988@2020-01-15!art5
        itemId:
          $ref: ../core/ID.yaml
          description: The ID of the timeless 'Item' this object is a version of.
          example: urn:lex:br:federal:constituicao:1988
        type:
          type: string
          description: Distinguishes between textual legislative versions (statutory) and non-textual judicial interpretive versions. Statutory Versions (S-TV) result from legislative amendments and contain modified text. Interpretive Versions (I-TV) result from judicial decisions that alter the normative meaning without changing the statutory text—modeling the phenomenon of "interpretive drift" where courts reshape legal norms through binding precedents.
          enum:
            - statutory
            - interpretive
          example: statutory
        validityInterval:
          $ref: ../core/TimeInterval.yaml
          description: The time interval during which this version was legally valid.
        applicabilityInterval:
          $ref: ../core/TimeInterval.yaml
          nullable: true
          description: The time interval during which this version can produce legal effects. Distinct from validityInterval, this captures the period when the norm is actually applicable, enabling management of complex scenarios such as temporary suspension of efficacy or tax precedence rules, where the capacity to produce effects may not coincide with the formal lifetime of the rule. Inspired by the ELI ontology's distinction between validity and application.
        producedByActionId:
          $ref: ../core/ID.yaml
          nullable: true
          description: |-
            Reference to the **Action** that created this version (Provenance/Backward Causality). This property materializes the inverse relationship of LRMoo **R16 created**.

            Through this property, the agent can discover the origin of a version (e.g., "This text came from the caput of Art. 1 of Constitutional Amendment 20").

            This controlled denormalization eliminates the need for full database scans for provenance questions, essential for legal reasoning.
          example: urn:lex:br:federal:emenda.constitucional:2000-02-14;26@2000-02-14!art1_cpt_alt1_art6_cpt
        terminatedByActionId:
          $ref: ../core/ID.yaml
          nullable: true
          description: |-
            Reference to the **Action** that terminated the validity of this version (Backward Causality). This property materializes the inverse relationship of CIDOC-CRM **P31 has modified**.

            This is null for versions that are still active (validityInterval.end is null).

            Through this property, the agent can discover what ended a version's validity (e.g., "This version was terminated by Constitutional Amendment 45/2004").
          example: urn:lex:br:federal:emenda.constitucional:2004-12-30;45@2004-12-30!art1_cpt_alt1_art5_cpt
        usedAsSourceInActionIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |-
            References to the **Actions** that used this specific version as authorizing source to modify other parts of the graph (Forward Causality). This property materializes the inverse relationship of LRMoo **R15 has used**.

            Through this property, the agent can discover the effects of a norm (e.g., "The caput of Art. 1 of this Constitutional Amendment modified the caput of Article 5 of the Federal Constitution of 1988").

            This is typically populated for versions of legislative commands (alteration provisions) that serve as the legal basis for modifications.
          example:
            - urn:lex:br:federal:emenda.constitucional:2000-02-14;26@2000-02-14!art1_cpt_alt1_art6_cpt
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data specific to this version.

            **Best Practice:** Use internationally recognized vocabularies such as schema.org to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for guidance on structuring temporal version metadata.
    Theme:
      type: object
      description: |
        Represents an atemporal, conceptual entity used to classify Items and organize knowledge. Themes form a taxonomy (e.g., "Social Security" is a child of "Public Law") and serve as entry points for curated, topic-based searches.
      required:
        - id
        - label
      properties:
        id:
          $ref: ../core/ID.yaml
          description: 'The primary, opaque identifier for this Theme. The field is a string with no format restriction, allowing each implementation to choose the most appropriate strategy: UUIDs for distributed systems, deterministic hashes, or semantic identifiers. In the examples of this specification, the id field may be populated with a semantic identifier to facilitate reading.'
        urn:
          type: string
          nullable: true
          description: The persistent semantic identifier in URN format for this Theme. Represents the ontological identity of this thematic classification, serving as the key for interoperability, ontology mapping, and semantic web integration.
          minLength: 1
          example: urn:lex:br:federal:tema:previdencia-social
        url:
          type: string
          format: uri
          nullable: true
          description: The canonical electronic address (Dereferenceable URI) pointing to the official definition or documentation of this Theme. This field is used for human reference and external system integration.
          minLength: 1
          example: https://normas.leg.br/temas/previdencia-social
        label:
          type: string
          description: The human-readable name or label for the theme.
          example: Social Security
        parentIds:
          type: array
          nullable: true
          description: An optional list of IDs of broader themes in the taxonomy. A theme can have multiple parents to support poly-hierarchical classification.
          items:
            $ref: ../core/ID.yaml
          example:
            - urn:lex:br:federal:tema:direito.publico
        childrenIds:
          type: array
          nullable: true
          description: An optional list of IDs of more specific themes in the taxonomy.
          items:
            $ref: ../core/ID.yaml
          example:
            - urn:lex:br:federal:tema:pensoes
            - urn:lex:br:federal:tema:saude
        memberIds:
          type: array
          nullable: true
          description: An optional list of IDs of the 'Item's that are classified under this theme. A theme can have no members if it serves only as a structural node in the taxonomy.
          items:
            $ref: ../core/ID.yaml
          example:
            - urn:lex:br:federal:constituicao:1988-10-05!artX
            - urn:lex:br:federal:lei:2025-05-14;abc
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data. Used for storing structured properties of the theme, such as scope, domain-specific attributes, or additional classification information that doesn't fit into other fields.

            **Best Practice:** Use schema.org vocabularies (e.g., schema.org/DefinedTerm) to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for guidance on structuring thematic metadata.
    ItemType:
      type: object
      description: |
        Represents a classification type in the Item taxonomy. ItemTypes form a poly-hierarchical structure that defines the formal type system for Items. For example, in the legal domain, "Article" is a type of "Component" and can contain "Caput" and "Paragraph".
        ItemTypes enable: - Validation of Item hierarchies (e.g., an Article can only contain Paragraphs) - Rich metadata about types (icons, levels, constraints) - Multilingual descriptions via associated TextUnits (using aspects like 'description', 'summary') - Discovery and navigation of the type system
        **Usage Across Domains:**
        While originally designed for legislative structure (Articles, Paragraphs, etc.), ItemTypes also support judicial and case law modeling:
        - **Legislative Types**: Constitution, Law, Article, Paragraph, Inciso, Alinea - **Judicial Types**: Judgment, Overruling, Distinguishing, Constitutional Mutation - **Judgment Components**: Voto do Relator, Ementa, Relatório, Dispositivo - **Common Law Types**: Opinion, Majority Opinion, Dissenting Opinion, Concurring Opinion
        This allows a unified taxonomic approach across both statutory text and judicial precedents.
      required:
        - id
        - label
      properties:
        id:
          $ref: ../core/ID.yaml
          description: 'The primary, opaque identifier for this ItemType. The field is a string with no format restriction, allowing each implementation to choose the most appropriate strategy: UUIDs for distributed systems, deterministic hashes, or semantic identifiers. In the examples of this specification, the id field is populated with a semantic identifier (e.g., "article") to facilitate reading.'
          example: article
        urn:
          type: string
          nullable: true
          description: The persistent semantic identifier in URN format for this ItemType. Represents the ontological identity of this type classification, serving as the key for interoperability and semantic web integration.
          minLength: 1
          example: urn:lex:br:federal:tipo-dispositivo:artigo
        url:
          type: string
          format: uri
          nullable: true
          description: The canonical electronic address (Dereferenceable URI) pointing to the official definition or documentation of this ItemType. This field is used for human reference and external system integration.
          minLength: 1
          example: https://normas.leg.br/?urn=urn:lex:br:federal:tipo-dispositivo:artigo
        label:
          type: string
          description: The human-readable name or label for this type.
          minLength: 1
          example: Article
        parentIds:
          type: array
          nullable: true
          description: An optional list of IDs of broader types in the taxonomy. An ItemType can have multiple parents to support poly-hierarchical classification (e.g., "Legal Provision" might be both a "Work Concept" and a "Normative Content").
          items:
            $ref: ../core/ID.yaml
          example:
            - component
        childrenIds:
          type: array
          nullable: true
          description: An optional list of IDs of more specific types in the taxonomy (Is-A hierarchy). Represents specialization relationships.
          items:
            $ref: ../core/ID.yaml
        allowedPartsIds:
          type: array
          nullable: true
          description: An optional list of IDs of ItemTypes that are allowed as structural parts within instances of this ItemType. This defines composition rules (Allowed-Part-Of dimension), separate from taxonomic relationships. For example, "Article" might allow "Caput" and "Paragraph" as parts, but not "Chapter" or "Section".
          items:
            $ref: ../core/ID.yaml
          example:
            - paragraph
            - inciso
            - alinea
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data. Used for storing type-specific properties such as validation rules, UI hints, structural constraints, or other domain-specific attributes.
            Examples: - Validation rules: which types can contain which other types - UI hints: icons, colors, display order - Structural constraints: max depth, numbering schemes - Legal semantics: normative weight, citation formats
          example:
            level: 2
            icon: 📄
    TextUnit:
      type: object
      description: |
        Represents a concrete piece of textual information. It is a flexible object used to hold any aspect of text associated with a primary entity in the graph.
      required:
        - id
        - sourceType
        - sourceId
        - language
        - aspect
        - content
      properties:
        id:
          $ref: ../core/ID.yaml
          description: A unique identifier for this specific piece of text.
          example: urn:lex:br:federal:constituicao:1988@1988-10-05~text;pt!art1_par1
        sourceType:
          type: string
          description: The type of the source node in the graph to which this text is attached. This provides essential context for the retrieved text.
          enum:
            - Theme
            - Item
            - Version
            - Action
            - Relation
          example: Version
        sourceId:
          $ref: ../core/ID.yaml
          description: The unique ID of the source node.
          example: urn:lex:br:federal:constituicao:1988@1988-10-05!art1_par1
        language:
          type: string
          description: The language of the content, specified as an IETF BCP 47 tag.
          pattern: ^[a-zA-Z]{2,3}(?:-[a-zA-Z0-9]+)*$
          example: pt-BR
        aspect:
          type: string
          description: |-
            The semantic role of the text relative to its source node, forming the core of the multi-aspect retrieval model. The `canonical` aspect is special; it represents a segment of the official text of a document (e.g. legal provision,  i.e., the content of a legal norm's component). It is associated with a `Version`. Other aspects represent secondary or descriptive texts about a node. `textualMetadata` is a representation in natural language of object's metadata and allow semantic filters in their contents (structured metadata can also be declared  in `Item` and `Version`, to ensure deterministic filters). `textualRelation` is a representation in natural language of object's relation and allow semantic filters in their contents--this approach is described in the:
                  [SAT Graph RAG paper)](https://arxiv.org/abs/2505.00039).
            `indexical` is a alterative identifier or name (surname) that can be used in semantic reference search--this approach is proposed in:
                  [Poly-Vector Retrieval: Reference and Content Embeddings for Legal Documents)](https://arxiv.org/abs/2504.10508).

            The enumerated values represent a baseline set of common aspects. A concrete implementation of the SAT-Graph may extend this list with additional, domain-specific aspects.
            **Judicial/Case Law Aspects:** - `ratio`: The ratio decidendi—the core legal reasoning that carries normative force. - `facts`: The narrative of evidentiary facts essential for distinguishing cases. - `holding`: The final dispositive command or decision outcome.
          pattern: ^[a-zA-Z]+$
          enum:
            - canonical
            - description
            - summary
            - textualMetadata
            - textualRelation
            - indexical
            - ratio
            - facts
            - holding
          example: canonical
        content:
          type: string
          minLength: 1
          description: |-
            The raw textual content of this unit. This content can be a direct segment from the raw document or a segment with complete semantics-- this approach is proposed in:
                  [Unlocking Legal Knowledge with Multi-Layered Embedding-Based Retrieval](https://arxiv.org/abs/2411.07739).
          example: Todo o poder emana do povo, que o exerce por meio de representantes eleitos ou diretamente, nos termos desta Constituição.
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data providing structured or additional metadata about this TextUnit. When a TextUnit represents an aspect of a Theme or Item (e.g., its description or summary), this field can optionally contain its structured representation alongside the natural language textual representation in the `content` property.

            **Best Practice:** Use internationally recognized vocabularies such as schema.org to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for guidance on structuring text unit metadata.
    Action:
      type: object
      description: |
        Represents a reified event (e.g., an amendment, a revocation). 
         
        It is important to clarify the scope of "causality" within this framework.  For exemple, in legislative domain, we address the chain of events that determine  the textual validity of a legal provision at a specific point in time  (causality in the textual-documentary world). This is distinct from the legal-dogmatic  concept of causality, which typically refers to the relationship between a real-world  event (the operative fact) and the legal norm that applies to it.
        It is a first-class entity that models a single, auditable causal link, connecting the source of a command to its precise effects on the version history of an Item.
      required:
        - id
        - type
        - eventTime
        - sourceVersionIds
      properties:
        id:
          $ref: ../core/ID.yaml
          description: A unique identifier for this specific action.
          example: urn:lex:br:federal:emenda.constitucional:2000-02-14;26@2000-02-14!art1_cpt_alt1_art6_cpt
        parentId:
          $ref: ../core/ID.yaml
          nullable: true
          description: |-
            The ID of the parent Action (macro-event) that this Action is part of.

            This property models the LRMoo/CIDOC-CRM relationship **P9i forms part of**, enabling the decomposition of macro-events (e.g., "Promulgation of Constitutional Amendment 26/2000") into atomic micro-events (e.g., "The command in Art. 1 of EC 26 that modifies Art. 6 of the Constitution").

            **Macro-events** serve as contextual groupers representing the global legislative or judicial act. **Micro-events** are the operational units that effectively transform the graph state through their causal triad (sourceVersionIds, terminatesVersionIds, producesVersionIds).

            This field is null for top-level macro-events that have no parent.
          example: urn:lex:br:federal:emenda.constitucional:2000-02-14;26@2000-02-14
        type:
          type: string
          description: |-
            The type of action. The enumerated values represent a baseline set; a concrete implementation may extend this list.
            **Legislative Actions** create or modify statutory text: - `Amendment`: Modifies existing statutory text. - `Revocation`: Removes statutory text from validity. - `Creation`: Enacts new statutory text. - `Repeal`: Formally cancels legislation.
            **Judicial Actions** create interpretive versions without altering statutory text: - `Interpretation`: A judicial decision that establishes or clarifies the meaning
              of a statutory provision, creating an Interpretive Version.
            - `Overruling`: A decision that explicitly reverses a prior judicial interpretation. - `Distinguishing`: A decision that limits the applicability of a prior precedent
              based on factual or legal differences.
            - `Constitutional Mutation`: A judicial reinterpretation that fundamentally alters
              the normative scope of a constitutional provision without textual amendment.

            **Hybrid Actions** bridge legislative and judicial domains: - `Legislative Override`: A legislative act specifically enacted to supersede
              a judicial interpretation.
          enum:
            - Amendment
            - Revocation
            - Creation
            - Repeal
            - Interpretation
            - Overruling
            - Distinguishing
            - Constitutional Mutation
            - Legislative Override
          example: Amendment
        eventTime:
          type: string
          format: date-time
          description: The date and time of this action, in UTC.
          example: '2000-02-14T00:00:00Z'
        validityInterval:
          $ref: ../core/TimeInterval.yaml
          description: The time interval imposed to the versions created by this action.
        applicabilityInterval:
          $ref: ../core/TimeInterval.yaml
          nullable: true
          description: The time interval during which the versions created by this action can produce legal effects. Distinct from validityInterval, this captures the period when the norm is actually applicable, enabling management of complex scenarios such as temporary suspension of efficacy or tax precedence rules, where the capacity to produce effects may not coincide with the formal lifetime of the rule. Inspired by the ELI ontology's distinction between validity and application.
        sourceVersionIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          description: |-
            The IDs of the specific 'Version(s)' of the legal text that **authorize** or **command** this single change. This is the source of the causal link.
            Multiple sources capture convergent rationale from multiple concurring opinions or related judgment components that jointly establish the binding reasoning (ratio decidendi) for an interpretive action.
            For simple legislative actions (e.g., a single amending law), this array typically contains one element. For judicial actions where the binding interpretation emerges from multiple concurring opinions, this array captures all relevant source components.
          example:
            - urn:lex:br:federal:supremo.tribunal.federal:acordao:2016-02-17;hc126292@2016-02-17!majority_opinion
            - urn:lex:br:federal:supremo.tribunal.federal:acordao:2016-02-17;hc126292@2016-02-17!concurring_opinion_1
        terminatesVersionIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |-
            The IDs of the 'Version(s)' whose validity is **terminated** by this action.

            For **micro-events** (atomic modifications), this array typically contains 0 or 1 element following the recommended 1:1 cardinality (one terminated version for one created version). This constraint is fundamental for the Autonomous Agent, enabling deterministic diff and lineage tracking functions without alignment ambiguities.

            For **macro-events** and future edge cases (e.g., fusions of two provisions into one, or complex revocations affecting multiple versions), this array may contain multiple elements.

            This is empty for original enactments (Creations) that produce new versions without terminating any existing ones.
          example:
            - urn:lex:br:federal:constituicao:1988-10-05;1988@1988-10-05!art6_cpt
        producesVersionIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |-
            The IDs of the 'Version(s)' that are **created** by this action.

            For **micro-events** (atomic modifications), this array typically contains 0 or 1 element. For **macro-events** (e.g., promulgation of a new law), this array may contain multiple elements representing all versions created by the event (e.g., the complete law version plus all original article versions).

            This is empty for pure Revocation or Repeal actions that terminate a version without creating a new one (e.g., when a statute is completely repealed without replacement, or when a judicial interpretation is overruled without establishing a new binding interpretation).
          example:
            - urn:lex:br:federal:constituicao:1988-10-05;1988@2000-02-14!art6_cpt
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data providing more context about the action, such as its source of the assertion.

            **Best Practice:** Use schema.org vocabularies (e.g., schema.org/LegislationObject) to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for guidance on structuring legislative event metadata.
    Relation:
      type: object
      description: |
        Represents a directed, typed, and potentially time-bound link between two entities in the graph (Items or Versions). This polymorphic design allows for modeling a rich web of interactions, distinguishing between timeless conceptual links and time-bound references embedded in text. The optional 'validityInterval' allows for modeling temporal relationships that are only true for a specific period.
      required:
        - id
        - sourceType
        - sourceId
        - predicate
        - targetType
        - targetId
      properties:
        id:
          $ref: ../core/ID.yaml
          description: A unique identifier for this specific relation instance.
        sourceType:
          type: string
          description: The type of the entity at the source of the relation.
          enum:
            - Item
            - Version
          example: Item
        sourceId:
          $ref: ../core/ID.yaml
          description: The ID of the source entity.
          example: urn:lex:br:federal:constituicao:1988-10-05;1988
        predicate:
          type: string
          description: The type of the relationship. This defines the semantics of the link. The enumerated values represent a baseline set; a concrete implementation may extend this list with a more detailed vocabulary or ontology.
          enum:
            - succeeds
            - relatedTo
            - appliesTo
            - cites
            - definedIn
          example: succeeds
        targetType:
          type: string
          description: The type of the entity at the target of the relation.
          enum:
            - Item
            - Version
          example: Item
        targetId:
          $ref: ../core/ID.yaml
          description: The ID of the target entity.
          example: urn:lex:br:federal:constituicao:1967-01-24;1967
        validityInterval:
          $ref: ../core/TimeInterval.yaml
          nullable: true
          description: The time interval during which this relation is valid. If null, the relation is considered atemporal.
          example:
            - '2020-03-15T00:00:00Z'
            - '2020-09-15T23:59:59Z'
        metadata:
          $ref: ../core/JSON.yaml
          nullable: true
          description: |-
            A flexible field for any valid JSON data providing more context about the relation, such as its own validity interval or source of the assertion.

            **Best Practice:** Use schema.org vocabularies to enable semantic interoperability. See [Metadata Best Practices](../../docs/METADATA_BEST_PRACTICES.md) for guidance on structuring relationship metadata.
    SearchItemsRequest:
      type: object
      description: |
        The request body for the searchItems operation.

        **Structural Scoping — `itemIds` vs `itemUrns`:**
        Both filters perform **hierarchical traversal** — passing a root Item's identifier causes the search to include Items from all descendant Items as well. They differ in mechanism:
        - `itemIds`: portable, works with any ID scheme; implemented via recursive SQL (e.g., `CONNECT BY` / recursive CTE on the `parent_id` column)
        - `itemUrns`: optimization for LEX URN implementations; implemented via an index range scan (`LIKE 'urn:lex:...;10406!%'`), avoiding recursive traversal at the cost of portability

        If both are provided, implementations should prefer `itemUrns` for performance when URNs are available.
      properties:
        itemIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. A list of Item IDs to define the structural scope for the search.

            The traversal is **hierarchical**: each provided ID is treated as a root, and the search includes Items from all its descendants as well.
            Implemented via recursive SQL (e.g., `CONNECT BY PRIOR id = parent_id` in Oracle, or a recursive CTE in ANSI SQL).

            Use this when Item IDs are known and the implementation does not use the LEX URN convention.
            For LEX URN-based implementations, prefer `itemUrns` for better query performance.
          example:
            - urn:lex:br:federal:lei:2002-01-10;10406
            - urn:lex:br:federal:lei:1973-10-10;6015
        itemUrns:
          type: array
          items:
            type: string
          description: |
            Optional. A list of Item URNs (LEX URN standard) to define the structural scope for the search.

            The traversal is **hierarchical**: each URN is used as a prefix to match the target Item and all its descendants via an index range scan on the `urn` column (`LIKE 'urn:lex:...;10406!%'`).
            This avoids recursive SQL traversal and is significantly more efficient for large norm hierarchies.

            **This filter is only effective when the implementation populates the `urn` field on `Item` following the LEX URN convention**, where component URNs are formed by appending `!<component-path>` to the parent norm's URN (e.g., `urn:lex:br:federal:lei:2002-01-10;10406!art186`).
            If `urn` is null or does not follow this convention, use `itemIds` instead.

            If both `itemIds` and `itemUrns` are provided, implementations should prefer `itemUrns`.
          example:
            - urn:lex:br:federal:lei:2002-01-10;10406
            - urn:lex:br:federal:lei:1973-10-10;6015
        themeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: Optional. A list of 'Theme' IDs to expand the search scope.
        itemTypeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. Filter search results to only items of the specified types (references to ItemType entities).
          example:
            - item-type:article
            - item-type:paragraph
        itemMetadataFilter:
          $ref: ../common/ItemMetadataFilterSchema.yaml
        contentQuery:
          $ref: ../common/ContentQuery.yaml
        topK:
          type: integer
          format: int32
          default: 10
          minimum: 1
          description: The maximum number of results to return.
        dataSources:
          $ref: ../common/DataSourcesSchema.yaml
    SearchTextUnitsRequest:
      type: object
      description: |
        The request body for the searchTextUnits operation.

        This endpoint performs **semantic and lexical discovery** within a defined scope. For deterministic fetching of TextUnits by specific Version IDs, use `getBatchTextUnits` instead.

        **Scoping:**
        - Use `itemIds` and/or `themeIds` to define the structural or thematic scope
        - Use `at` to constrain temporally (if omitted, no temporal filter is applied)
        - If neither `itemIds`, `itemUrns`, nor `themeIds` is provided, the search applies globally across all accessible data

        **Structural Scoping — `itemIds` vs `itemUrns`:**
        Both filters perform **hierarchical traversal** — passing a root Item's identifier causes the search to include TextUnits from all descendant Items as well. They differ in mechanism:
        - `itemIds`: portable, works with any ID scheme; implemented via recursive SQL (e.g., `CONNECT BY` / recursive CTE on the `parent_id` column)
        - `itemUrns`: optimization for LEX URN implementations; implemented via an index range scan (`LIKE 'urn:lex:...;10406!%'`), avoiding recursive traversal at the cost of portability

        If both are provided, implementations should prefer `itemUrns` for performance when URNs are available.

        **Search Query:**
        - `contentQuery`: A unified JSON structure for hybrid search combining semantic and lexical queries with advanced filtering
        - Required for effective discovery

        **Optional Filters:**
        - `itemTypeIds`: Filter results to only TextUnits from Items of specified types
        - `metadataFilter`: Apply additional metadata-based filtering
      properties:
        itemIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. A list of Item IDs to define the structural scope for the search.

            The traversal is **hierarchical**: each provided ID is treated as a root, and the search includes TextUnits from all its descendant Items as well.
            Implemented via recursive SQL (e.g., `CONNECT BY PRIOR id = parent_id` in Oracle, or a recursive CTE in ANSI SQL).

            Use this when Item IDs are known and the implementation does not use the LEX URN convention.
            For LEX URN-based implementations, prefer `itemUrns` for better query performance.
          example:
            - urn:lex:br:federal:lei:2002-01-10;10406
            - urn:lex:br:federal:lei:1973-10-10;6015
        itemUrns:
          type: array
          items:
            type: string
          description: |
            Optional. A list of Item URNs (LEX URN standard) to define the structural scope for the search.

            The traversal is **hierarchical**: each URN is used as a prefix to match the target Item and all its descendants via an index range scan on the `urn` column (`LIKE 'urn:lex:...;10406!%'`).
            This avoids recursive SQL traversal and is significantly more efficient for large norm hierarchies.

            **This filter is only effective when the implementation populates the `urn` field on `Item` following the LEX URN convention**, where component URNs are formed by appending `!<component-path>` to the parent norm's URN (e.g., `urn:lex:br:federal:lei:2002-01-10;10406!art186`).
            If `urn` is null or does not follow this convention, use `itemIds` instead.

            If both `itemIds` and `itemUrns` are provided, implementations should prefer `itemUrns`.
          example:
            - urn:lex:br:federal:lei:2002-01-10;10406
            - urn:lex:br:federal:lei:1973-10-10;6015
        itemTypeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. Filter search results to only TextUnits from Items of the specified types (references to ItemType entities).
            More efficient than using `metadataFilter` for type-based filtering.
          example:
            - item-type:article
            - item-type:paragraph
        themeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. A list of Theme IDs to define the thematic scope for the search.
        metadataFilter:
          $ref: ../common/MetadataFilter.yaml
        at:
          type: string
          format: date-time
          description: |
            Optional. A UTC date-time to constrain the search to TextUnits valid at that point in time. If omitted, no temporal filter is applied and all versions are returned regardless of validity period.
        contentQuery:
          $ref: ../common/ContentQuery.yaml
        language:
          type: string
          description: The IETF BCP 47 language code for the content.
          example: pt-BR
        aspects:
          type: array
          items:
            type: string
          default:
            - canonical
          description: A list of textual aspects to search within (e.g., 'canonical', 'summary').
        topK:
          type: integer
          format: int32
          default: 10
          minimum: 1
          description: The maximum number of results to return.
        dataSources:
          $ref: ../common/DataSourcesSchema.yaml
          description: Optional. Scopes the search to a specific list of granted data sources.
    GetItemHierarchyRequest:
      type: object
      description: |
        Specifies the scope and filters for enumerating Item objects.

        Filters are applied after scope resolution (itemIds/themeIds/depth).
      properties:
        itemIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: Optional. A list of 'Item' IDs to define a structural scope. The function will return these items and/or their descendants.
        themeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: Optional. A list of 'Theme' IDs to define a thematic scope. The function will return all member items of these themes.
        depth:
          type: integer
          description: |
            Controls traversal depth for 'itemIds' scopes. If `depth=1`, only direct children are returned. If omitted or negative, all descendants are returned recursively. This parameter is ignored for 'themeIds' scopes.
          default: -1
        itemTypeIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |
            Optional. Filter results to only items of the specified types (references to ItemType entities).
          example:
            - item-type:article
            - item-type:paragraph
        dataSources:
          $ref: ../common/DataSourcesSchema.yaml
    GetRelationsRequest:
      type: object
      description: Specifies the criteria for querying Relation objects. If 'entityId' is omitted, the query runs against the entire corpus of relations.
      properties:
        entityId:
          $ref: ../core/ID.yaml
          description: Optional. The ID of an anchor entity. If provided, 'entityType' is required.
        entityType:
          type: string
          description: Optional. The type of the anchor entity. Required only if 'entityId' is provided.
          enum:
            - Item
            - Version
        predicate:
          type: string
          description: Optional. Filters relations by a specific predicate (e.g., 'cites').
        direction:
          type: string
          description: Specifies the direction of the relations to retrieve relative to the 'entityId'.
          enum:
            - forward
            - backward
            - both
          default: both
        validityIntervalFilter:
          type: object
          description: Optional. Filters relations to those whose validity interval overlaps with the specified interval.
          properties:
            startTime:
              type: string
              format: date-time
            endTime:
              type: string
              format: date-time
        metadataFilter:
          type: object
          additionalProperties: true
          description: Optional. Key-value pairs to filter against the 'metadata' of the Relation.
        dataSources:
          $ref: ../common/DataSourcesSchema.yaml
    GetBatchActionsRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of Action objects.
      required:
        - ids
      properties:
        ids:
          type: array
          description: A list of unique identifiers for the Actions to retrieve.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
    GetBatchItemsRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of Item objects.
      required:
        - ids
      properties:
        ids:
          type: array
          description: A list of canonical IDs for the Items to retrieve.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
    GetBatchVersionsRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of Version objects by their IDs.
      required:
        - ids
      properties:
        ids:
          type: array
          description: A list of canonical IDs for the Versions to retrieve.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
    GetBatchValidVersionsRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of valid Version objects.
      required:
        - itemIds
        - at
      properties:
        itemIds:
          type: array
          description: A list of canonical IDs for the Items whose valid versions are requested.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
        at:
          type: string
          format: date-time
          description: The specific UTC date-time for which to check validity for all items (Valid Time).
        observerTime:
          type: string
          format: date-time
          description: Optional. The temporal perspective from which to view the graph (Transaction Time). If omitted, defaults to "now" (current legal truth). If provided, filters out Actions that occurred after this time, enabling historical state reconstruction.
    GetBatchTextUnitsRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of TextUnit objects by Version IDs.
      required:
        - versionIds
        - language
      properties:
        versionIds:
          type: array
          description: A list of identifiers for the Versions of interest.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
        language:
          type: string
          description: The language code to retrieve (e.g., 'pt-br', 'en').
          pattern: ^[a-zA-Z]{2,3}(?:-[a-zA-Z0-9]+)*$
          example: pt-br
        aspects:
          type: array
          description: |
            Optional. A list of textual aspects to retrieve for all Versions
            (e.g., ["canonical", "summary"]). Defaults to ["canonical"].
          items:
            type: string
          default:
            - canonical
          example:
            - canonical
            - summary
    GetBatchItemTypesRequest:
      type: object
      description: Specifies the criteria for retrieving a batch of ItemType objects.
      required:
        - ids
      properties:
        ids:
          type: array
          description: A list of canonical IDs for the ItemTypes to retrieve.
          items:
            $ref: ../core/ID.yaml
          minItems: 1
          uniqueItems: true
    ResolvedItemCandidate:
      type: object
      description: Represents a single candidate match when resolving a text reference to an Item, including the full entity and the confidence score.
      required:
        - item
        - confidence
      properties:
        item:
          $ref: ../entities/Item.yaml
          description: The matched Item entity.
        confidence:
          type: number
          format: float
          description: A score from 0.0 to 1.0 indicating the certainty of the match.
          minimum: 0
          maximum: 1
          example: 0.95
    ResolvedThemeCandidate:
      type: object
      description: Represents a single candidate match when resolving a text reference to a Theme, including the full entity and the confidence score.
      required:
        - theme
        - confidence
      properties:
        theme:
          $ref: ../entities/Theme.yaml
          description: The matched Theme entity.
        confidence:
          type: number
          format: float
          description: A score from 0.0 to 1.0 indicating the certainty of the match.
          minimum: 0
          maximum: 1
          example: 0.95
    ResolvedItemTypeCandidate:
      type: object
      description: Represents a single candidate match when resolving a text reference to an ItemType, including the full entity and the confidence score.
      required:
        - itemType
        - confidence
      properties:
        itemType:
          $ref: ../entities/ItemType.yaml
          description: The matched ItemType entity.
        confidence:
          type: number
          format: float
          description: A score from 0.0 to 1.0 indicating the certainty of the match.
          minimum: 0
          maximum: 1
          example: 0.95
    SearchResultUnit:
      type: object
      description: Represents a single search result, containing a TextUnit and its relevance score.
      required:
        - textUnit
        - score
      properties:
        textUnit:
          $ref: ../entities/TextUnit.yaml
        score:
          type: number
          format: float
          description: The relevance score of the result, typically between 0.0 and 1.0.
          minimum: 0
          maximum: 1
    SearchedItemResult:
      type: object
      description: Represents a single search result, containing an Item and its relevance score.
      required:
        - item
        - score
      properties:
        item:
          $ref: ../entities/Item.yaml
        score:
          type: number
          format: float
          description: The relevance score of the result, typically between 0.0 and 1.0.
          minimum: 0
          maximum: 1
    ErrorResponse:
      type: object
      description: A standard format for error responses.
      properties:
        code:
          type: string
          description: An internal, machine-readable error code.
          example: FORBIDDEN_DATASOURCE
        message:
          type: string
          description: A human-readable description of the error.
          example: The provided API Key does not have access to the 'dataSource_STF' data source.
    CausalityTrace:
      type: object
      description: An object containing the specific Actions that created and (optionally) terminated a Version.
      required:
        - creatingAction
      properties:
        creatingAction:
          $ref: ../relationships/Action.yaml
          description: The Action that brought this Version into existence (its provenance).
        terminatingAction:
          $ref: ../relationships/Action.yaml
          nullable: true
          description: The Action that terminated the validity of this Version. This will be null if the Version is still valid.
    TextDiffReport:
      type: object
      description: |
        A structured report detailing the differences between two Versions. It can highlight changes at both the textual and structural levels.
      properties:
        changes:
          type: array
          description: An ordered list of differences found between the two versions.
          items:
            type: object
            properties:
              type:
                type: string
                description: The type of change.
                enum:
                  - addition
                  - deletion
                  - modification
              level:
                type: string
                description: The structural level at which the change was detected.
                enum:
                  - component
                  - sentence
                  - word
              componentId:
                $ref: ../core/ID.yaml
                description: The ID of the Item component where the change occurred.
              contentBefore:
                type: string
                description: The content from the first version ('version A'). Empty for additions.
              contentAfter:
                type: string
                description: The content from the second version ('version B'). Empty for deletions.
    HierarchyResponse:
      type: object
      required:
        - rootId
        - descendantIds
      properties:
        rootId:
          $ref: ../core/ID.yaml
          description: The ID of the root entity (ItemType or Theme) for which hierarchy was requested.
        descendantIds:
          type: array
          items:
            $ref: ../core/ID.yaml
          description: |-
            A flat list of all descendant IDs in the hierarchy, including the rootId itself. This list includes all direct children, grandchildren, and deeper descendants.
            The order is not guaranteed to follow any specific traversal pattern (depth-first or breadth-first). Clients should treat this as an unordered set of IDs.
            **Use Case:** This list is designed to be passed directly to filter parameters in search or retrieval operations (e.g., `searchItems(itemTypeIds=[...])` or `searchItems(themeIds=[...])`).
          example:
            - item-type:normative-component
            - item-type:article
            - item-type:paragraph
            - item-type:clause
            - item-type:item
            - item-type:subitem
      description: Response containing a flat list of all descendant IDs for a given hierarchy node (ItemType or Theme). Used for hierarchical filtering in search operations.
  parameters:
    DataSourcesParameter:
      name: dataSources
      in: query
      required: false
      description: |
        **Optional.** A list of identifiers for the DataSources to scope the search.

        A DataSource is the system or provider where an entity originates (e.g., 'dataSource_Senate'). This parameter allows you to narrow a search to a specific subset of the DataSources you have access to.

        The API will only return results from DataSources that are both *requested* in this parameter and *granted* to your API key. If this parameter is omitted, the search will run against all DataSources your key is granted to.
      schema:
        type: array
        items:
          type: string
        uniqueItems: true
      example:
        - dataSource_A
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        API Key-based authentication. Each consumer must provide their unique API Key
        directly in the `Authorization` header for every request.

        **Example:** `Authorization: YOUR_API_KEY`

        API Keys can be obtained by contacting the system administrator.
  responses:
    BadRequest:
      description: Bad Request - The request is missing a required parameter, includes an invalid parameter value, or is otherwise malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INVALID_PARAMETER
            message: The 'topK' parameter must be a positive integer.
    Unauthorized:
      description: Unauthorized - The request lacks valid authentication credentials. The API Key is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: Authentication credentials were not provided or are invalid.
    Forbidden:
      description: Forbidden - The server understood the request, but is refusing to fulfill it. The API Key is valid but lacks permission for the requested resource or data source.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN_DATASOURCE
            message: The provided API Key does not have access to the 'dataSource_STF' data source.
    NotFound:
      description: Not Found - The requested resource could not be found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: RESOURCE_NOT_FOUND
            message: No Item found with the specified ID.
security:
  - ApiKeyAuth: []
paths:
  /items/by-reference:
    get:
      tags:
        - Discovery and Search Actions
      summary: Resolve a text reference to a ranked list of Item candidates.
      operationId: resolveItemReference
      description: |
        Translates an ambiguous, natural-language reference to an entity into a **ranked list of candidate** `Item` objects.
        This is the critical first step for any query that names a specific entity (a document component, a concept, a named entity, etc.), acting as the bridge between user language and the graph's formal identifiers.

        ### Discussion
        This action is indispensable for grounding agentic workflows. References are often highly ambiguous ("Article 1") or relative ("the following paragraph").
        This function handles this by returning a ranked list of candidates rather than forcing a single, potentially incorrect guess.
        The optional `contextId` parameter significantly enhances its precision for context-aware interactions.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: referenceText
          in: query
          required: true
          description: A string such as "Article 5 of the Constitution", "the Civil Code", or a relative reference like "the previous section".
          schema:
            type: string
          example: Article 5 of the Constitution
        - name: contextId
          in: query
          required: false
          description: Optional. The ID of an 'Item' to provide structural context. This helps resolve relative or ambiguous references.
          schema:
            $ref: '#/components/schemas/ID'
          example: urn:lex:br:federal:constituicao:1988-10-05;1988
        - name: time
          in: query
          required: false
          description: Optional. The specific UTC date-time for which to resolve the reference. Defaults to "now" if omitted. When provided, the Item labels and structure are evaluated as they existed at that point in time. Useful for disambiguating references when entities have been renamed or reorganized.
          schema:
            type: string
            format: date-time
          example: '2016-01-15T10:30:00Z'
        - name: topK
          in: query
          required: false
          description: The maximum number of candidate matches to return.
          schema:
            type: integer
            format: int32
            default: 3
            minimum: 1
        - $ref: '#/components/parameters/DataSourcesParameter'
      responses:
        '200':
          description: A ranked list of probable Item matches was successfully returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResolvedItemCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /themes/by-reference:
    get:
      tags:
        - Discovery and Search Actions
      summary: Resolve a text reference to a ranked list of Theme candidates.
      operationId: resolveThemeReference
      description: |
        Translates a natural-language name or label for a legal theme into a **ranked list of candidate** `Theme` objects.
        This is the primary entry point for grounding a query in a specific conceptual category.

        ### Discussion
        This action is the conceptual counterpart to `resolveItemReference`. It performs entity linking for thematic nodes, allowing an agent to deterministically identify a theme mentioned by name before using it as a scope in other actions.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: referenceText
          in: query
          required: true
          description: A string representing the name of a theme, such as "Social Security" or "Environmental Law".
          schema:
            type: string
          example: Environmental Law
        - name: topK
          in: query
          required: false
          description: The maximum number of candidate matches to return.
          schema:
            type: integer
            format: int32
            default: 3
            minimum: 1
        - $ref: '#/components/parameters/DataSourcesParameter'
      responses:
        '200':
          description: A ranked list of probable Theme matches was successfully returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResolvedThemeCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /item-types/by-reference:
    get:
      tags:
        - Discovery and Search Actions
      summary: Resolve a text reference to a ranked list of ItemType candidates.
      operationId: resolveItemTypeReference
      description: |
        Translates a natural-language name or label for an item type into a **ranked list of candidate** `ItemType` objects.
        This is the primary entry point for grounding a query in a specific structural category.

        ### Discussion
        This action is the structural counterpart to `resolveThemeReference`. It performs entity linking for item type nodes, allowing an agent to deterministically identify an item type mentioned by name before using it as a filter in other actions like `searchItems`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: referenceText
          in: query
          required: true
          description: A string representing the name of an item type, such as "Article", "Section", "Law", or "Constitutional Amendment".
          schema:
            type: string
          example: Article
        - name: topK
          in: query
          required: false
          description: The maximum number of candidate matches to return.
          schema:
            type: integer
            format: int32
            default: 3
            minimum: 1
        - $ref: '#/components/parameters/DataSourcesParameter'
      responses:
        '200':
          description: A ranked list of probable ItemType matches was successfully returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResolvedItemTypeCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /items/search:
    post:
      tags:
        - Discovery and Search Actions
      summary: Performs a hybrid search for Items across their entire version history.
      operationId: searchItems
      description: |
        Performs a hybrid search to discover `Item` nodes by combining semantic, lexical, and structured criteria.
        This action is intentionally **time-agnostic**, searching across the entire version history of each item's text to ensure comprehensive discovery of the conceptual locus.

        ### Scoping
        Define the search scope using:
        - `itemIds` and/or `itemUrns` to restrict the search to a structural subtree (hierarchical traversal — all descendants of the provided items are included)
        - `themeIds` for thematic boundaries
        - Omit all to search globally across accessible data

        ### Discussion
        This action's purpose is **structural discovery**, not content retrieval. It is used to find the *item* that, at any point in its history, has dealt with a concept. This is fundamentally different from `searchTextUnits`, which finds the specific *text* that was valid at a specific point in time.
      security:
        - ApiKeyAuth: []
      requestBody:
        description: The search criteria for finding Items.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchItemsRequest'
      responses:
        '200':
          description: Search executed successfully. Returns a ranked list of Items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchedItemResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /text-units/search:
    post:
      tags:
        - Discovery and Search Actions
      summary: Performs a hybrid search for TextUnits.
      operationId: searchTextUnits
      description: |
        Performs a hybrid search to discover `TextUnit` nodes by combining semantic, lexical, and structured criteria, returning a ranked list of the most relevant results. This is the primary, optimized entry point for all standard RAG queries.

        ### Scoping
        Define the search scope using:
        - `itemIds` and/or `itemUrns` for structural boundaries (hierarchical traversal — all descendants of the provided items are included; prefer `itemUrns` for LEX URN implementations)
        - `themeIds` for thematic boundaries
        - `at` for temporal constraints (defaults to 'now')
        - Omit all to search globally across accessible data

        ### Deterministic Retrieval
        **Important:** If you already have specific Version IDs and want a deterministic fetch (not a ranked search), use `getBatchTextUnits` instead. That endpoint is optimized for bulk retrieval without search overhead.

        ### Filtering and Aspects
        Additional optional filters like `itemTypeIds` can further narrow results to specific structural components, enabling use cases such as searching only within articles or specific item hierarchies.

        The `aspects` parameter enables a truly holistic search, allowing a query to match a `Work`'s 'textual_metadata' just as easily as a `Version`'s 'canonical' text.
      security:
        - ApiKeyAuth: []
      requestBody:
        description: The search criteria.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTextUnitsRequest'
      responses:
        '200':
          description: Search executed successfully. Returns a ranked list of TextUnits.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResultUnit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /actions/{actionId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single Action by its unique ID.
      operationId: getAction
      description: |
        Retrieves the full `Action` data object given its unique identifier. This provides direct access to the details of a specific action, including its precise `sourceVersionIds`, and the `Version`s it terminates and produces.

        ### Discussion
        This is a core deterministic action used for auditing and causal analysis. It allows an agent to inspect the exact event that caused a change in a legal norm's version history.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: actionId
          in: path
          required: true
          description: The unique identifier of the Action to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the Action object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /items/{itemId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single Item by its canonical ID.
      operationId: getItem
      description: |
        Retrieves the full `Item` object given its unique, canonical ID.

        ### Discussion
        This is a core deterministic action for retrieving a specific structural node from the graph. It is a direct, primary-key-based lookup.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          description: The canonical ID of the Item to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the Item object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /relations/{relationId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single Relation by its unique ID.
      operationId: getRelation
      description: Retrieves the full `Relation` object given its unique identifier. Useful for inspecting the details of a specific link between entities.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: relationId
          in: path
          required: true
          description: The unique identifier of the Relation to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the Relation object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Relation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /themes/{themeId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single Theme by its canonical ID.
      operationId: getTheme
      description: |
        Retrieves the full `Theme` object given its unique, canonical ID.

        ### Discussion
        This is a core deterministic action for retrieving a specific node from the classification ontology. It is a direct, primary-key-based lookup.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: themeId
          in: path
          required: true
          description: The canonical ID of the Theme to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the Theme object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Theme'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /item-types/{itemTypeId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Retrieves a single ItemType by its unique ID.
      operationId: getItemType
      description: |
        Fetches the full `ItemType` object given its unique identifier.

        ### Discussion
        This is a deterministic fetch operation that returns complete ItemType data,
        including its position in the taxonomy (parents and children), metadata, and
        the canonical URI/URN if available.

        This endpoint is essential for:
        - Validating item hierarchies (checking if a type can contain another)
        - Displaying type information in UIs
        - Building type-aware editors and forms
        - Understanding the type system structure
      security:
        - ApiKeyAuth: []
      parameters:
        - name: itemTypeId
          in: path
          required: true
          description: The unique ID of the ItemType to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
          example: item-type:123456
      responses:
        '200':
          description: Successfully retrieved the ItemType object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /text-units/{textUnitId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single TextUnit by its unique ID.
      operationId: getTextUnit
      description: |
        Retrieves the full `TextUnit` object given its unique identifier, including its content and all associated metadata.

        ### Discussion
        While the primary method for discovering `TextUnit`s is through the `searchTextUnits` function, this deterministic endpoint provides direct, primary-key-based access. It ensures API completeness, allowing a client to retrieve a specific text snippet if it only has its ID, which might occur in advanced logging or auditing workflows.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: textUnitId
          in: path
          required: true
          description: The unique identifier of the TextUnit to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the TextUnit object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextUnit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /versions/{versionId}:
    get:
      tags:
        - Deterministic Fetch Actions
      summary: Get a single Version by its unique ID.
      operationId: getVersion
      description: Retrieves the full `Version` object given its unique identifier. This is the primary way to inspect the details of a specific temporal snapshot of an Item.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: versionId
          in: path
          required: true
          description: The unique identifier of the Version to retrieve.
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          description: Successfully retrieved the Version object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /items/batch-get:
    post:
      tags:
        - Deterministic Fetch Actions
      summary: Gets a batch of Item objects by their canonical IDs.
      operationId: getBatchItems
      description: |
        A batch-optimized version of `getItem`. Given a list of IDs, it efficiently retrieves the full data object for each corresponding `Item` in a single request.

        ### Discussion
        This is a fundamental utility action used after any discovery process to hydrate references into full objects. It is the primary solution to avoid the "N+1 query problem," where a client would otherwise need to make one API call per ID.
      security:
        - ApiKeyAuth: []
      requestBody:
        description: The list of Item IDs to retrieve.
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/requests/GetBatchItemsRequest.yaml
      responses:
        '200':
          description: |
            A list of the requested Item objects. The returned list may be shorter than the input list if some IDs were not found or if the consumer lacked permission. The order of the returned items is not guaranteed to match the input order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../../schemas/entities/Item.yaml
        '400':
          openapi: 3.0.3
          info:
            title: SAT-Graph API
            version: 1.0.0
            description: |
              This is the official OpenAPI 3.x specification for the **SAT-Graph API**,
              a formal, auditable interface for querying the Structure-Aware Temporal Graph (SAT-Graph).

              The complete architectural framework is proposed in the paper:
              - **[An Ontology-Driven Graph RAG for Legal Norms: A Structural, Temporal, and Deterministic Approach](https://arxiv.org/abs/2508.00827)**

              ## API Architecture

              This specification implements a **two-layer architecture**:

              ### 1. Canonical Core API (Research Paper)
              The foundational set of actions formally specified in the research paper:
              - SAT-Graph ontology: Item, Version, Action, Theme, TextUnit
              - Temporal reasoning and deterministic retrieval
              - Structural navigation and causal tracing
              - Minimal set of composable primitives

              ### 2. Extended API (Production Enhancements)
              Additional capabilities for production use cases:
              - **Relation System**: Semantic overlay graph for cross-document relationships
                (citations, references, dependencies)
              - **Convenience Operations**: Optimized endpoints for common patterns
              - Implements "Future Directions" outlined in the research paper

              **Design Principle:** Extensions maintain the same guarantees of composability,
              auditability, and verifiability as the canonical core.

              ---

              **Authentication Note:** All endpoints in this API are protected. A valid API Key
              must be sent in the `Authorization` header on every request. Please refer to the
              'securitySchemes' section below for details.

              **Data Scoping Note:** The API serves data from multiple providers, called **DataSources**.
              All requests are automatically scoped to the DataSources granted to your API key.
              Many search functions also provide an optional `dataSources` parameter for more granular filtering.
          components:
            schemas:
              ID:
                $ref: ./schemas/core/ID.yaml
              JSON:
                $ref: ./schemas/core/JSON.yaml
              TimeInterval:
                $ref: ./schemas/core/TimeInterval.yaml
              DataSourcesSchema:
                $ref: ./schemas/common/DataSourcesSchema.yaml
              MetadataFilter:
                $ref: ./schemas/common/MetadataFilter.yaml
              ItemMetadataFilterSchema:
                $ref: ./schemas/common/ItemMetadataFilterSchema.yaml
              ContentQuery:
                $ref: ./schemas/common/ContentQuery.yaml
              Item:
                $ref: ./schemas/entities/Item.yaml
              Version:
                $ref: ./schemas/entities/Version.yaml
              Theme:
                $ref: ./schemas/entities/Theme.yaml
              ItemType:
                $ref: ./schemas/entities/ItemType.yaml
              TextUnit:
                $ref: ./schemas/entities/TextUnit.yaml
              Action:
                $ref: ./schemas/relationships/Action.yaml
              Relation:
                $ref: ./schemas/relationships/Relation.yaml
              SearchItemsRequest:
                $ref: ./schemas/requests/SearchItemsRequest.yaml
              SearchTextUnitsRequest:
                $ref: ./schemas/requests/SearchTextUnitsRequest.yaml
              GetItemHierarchyRequest:
                $ref: ./schemas/requests/GetItemHierarchyRequest.yaml
              GetRelationsRequest:
                $ref: ./schemas/requests/GetRelationsRequest.yaml
              GetBatchActionsRequest:
                $ref: ./schemas/requests/GetBatchActionsRequest.yaml
              GetBatchItemsRequest:
                $ref: ./schemas/requests/GetBatchItemsRequest.yaml
              GetBatchVersionsRequest:
                $ref: ./schemas/requests/GetBatchVersionsRequest.yaml
              GetBatchValidVersionsRequest:
                $ref: ./schemas/requests/GetBatchValidVersionsRequest.yaml
              GetBatchTextUnitsRequest:
                $ref: ./schemas/requests/GetBatchTextUnitsRequest.yaml
              GetBatchItemTypesRequest:
                $ref: ./schemas/requests/GetBatchItemTypesRequest.yaml
              ResolvedItemCandidate:
                $ref: ./schemas/responses/ResolvedItemCandidate.yaml
              ResolvedThemeCandidate:
                $ref: ./schemas/responses/ResolvedThemeCandidate.yaml
              ResolvedItemTypeCandidate:
                $ref: ./schemas/responses/ResolvedItemTypeCandidate.yaml
              SearchResultUnit:
                $ref: ./schemas/responses/SearchResultUnit.yaml
              SearchedItemResult:
                $ref: ./schemas/responses/SearchedItemResult.yaml
              ErrorResponse:
                $ref: ./schemas/responses/ErrorResponse.yaml
              CausalityTrace:
                $ref: ./schemas/responses/CausalityTrace.yaml
              TextDiffReport:
                $ref: ./schemas/responses/TextDiffReport.yaml
              HierarchyResponse:
                $ref: ./schemas/responses/HierarchyResponse.yaml
            parameters:
              DataSourcesParameter:
                name: dataSources
                in: query
                required: false
                description: |
                  **Optional.** A list of identifiers for the DataSources to scope the search.

                  A DataSource is the system or provider where an entity originates (e.g., 'dataSource_Senate'). This parameter allows you to narrow a search to a specific subset of the DataSources you have access to.

                  The API will only return results from DataSources that are both *requested* in this parameter and *granted* to your API key. If this parameter is omitted, the search will run against all DataSources your key is granted to.
                schema:
                  type: array
                  items:
                    type: string
                  uniqueItems: true
                example:
                  - dataSource_A
            securitySchemes:
              ApiKeyAuth:
                type: apiKey
                in: header
                name: Authorization
                description: |
                  API Key-based authentication. Each consumer must provide their unique API Key
                  directly in the `Authorization` header for every request.

                  **Example:** `Authorization: YOUR_API_KEY`

                  API Keys can be obtained by contacting the system administrator.
            responses:
              BadRequest:
                description: Bad Request - The request is missing a required parameter, includes an invalid parameter value, or is otherwise malformed.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: INVALID_PARAMETER
                      message: The 'topK' parameter must be a positive integer.
              Unauthorized:
                description: Unauthorized - The request lacks valid authentication credentials. The API Key is missing or invalid.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: UNAUTHORIZED
                      message: Authentication credentials were not provided or are invalid.
              Forbidden:
                description: Forbidden - The server understood the request, but is refusing to fulfill it. The API Key is valid but lacks permission for the requested resource or data source.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: FORBIDDEN_DATASOURCE
                      message: The provided API Key does not have access to the 'dataSource_STF' data source.
              NotFound:
                description: Not Found - The requested resource could not be found.
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ErrorResponse'
                    example:
                      code: RESOURCE_NOT_FOUND
                      message: No Item found with the specified ID.
          security:
            - ApiKeyAuth: []
          paths:
            /items/by-reference:
              $ref: ./paths/discovery/resolve-item-reference.yaml
            /themes/by-reference:
              $ref: ./paths/discovery/resolve-theme-reference.yaml
            /item-types/by-reference:
              $ref: ./paths/discovery/resolve-item-type-reference.yaml
            /items/search:
              $ref: ./paths/discovery/search-items.yaml
            /text-units/search:
              $ref: ./paths/discovery/search-text-units.yaml
