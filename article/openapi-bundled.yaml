            /themes/by-items:
              post:
                tags:
                  - Deterministic Fetch Actions
                summary: Retrieves all Themes associated with a list of Items.
                operationId: getThemesForItems
                description: |
                  Retrieves the distinct set of `Theme`s associated with a given list of `Item` IDs.
                  This is the multi-item counterpart to `getThemesForItem`, optimized for cases where an
                  agent needs to determine the thematic context of multiple items in a single operation.

                  The response is a **flat, deduplicated list** of unique Themes. If an agent needs
                  to know which themes belong to which specific item, it should call `getThemesForItem`
                  per item instead.

                  ### Discussion
                  This action is particularly useful when an agent has already retrieved a set of
                  Items (e.g., via `searchItems` or `getItemAncestors`) and needs to understand their
                  thematic context without issuing one request per item.
                security:
