            /items/{sourceWorkId}/actions-caused:
              get:
                tags:
                  - Causal Analysis Actions
                summary: Retrieves all Actions caused by a specific source Work.
                operationId: getActionsBySource
                description: |
                  An essential action for impact analysis that provides forward causal tracing. Given the ID of a source `Work` (e.g., an amending law), it retrieves all atomic `Action`s authorized by any clause within that Work.

                  The returned list is ordered chronologically by the action's effective date.

                  ### Discussion
                  This action is the logical inverse of `traceCausality`. It traces forwards from a high-level cause to all of its granular effects, answering the critical question: "What did Law X do?".
                security:
                  - ApiKeyAuth: []
                parameters:
                  - name: sourceWorkId
                    in: path
                    required: true
                    description: The canonical ID of the source 'Work' (e.g., an amending law).
                    schema:
                      $ref: ../../schemas/core/ID.yaml
                  - name: actionTypes
                    in: query
                    required: false
                    description: Optional. Filters for specific types of actions.
                    schema:
                      type: array
                      items:
                        type: string
                        enum:
                          - Amendment
                          - Revocation
                          - Creation
                          - Repeal
                  - name: granularity
                    in: query
                    required: false
                    description: |-
                      Optional. Filters Actions by hierarchical granularity level. - 'macro': Returns only top-level macro-events (parentId = null), representing global
                        legislative acts (e.g., "Promulgation of Constitutional Amendment 26/2000").
                      - 'micro': Returns only atomic micro-events (parentId != null), representing specific
                        transformations (e.g., "Art. 1 of CA 26 modifying Art. 6 of the Constitution").
                      - If omitted, returns both macro and micro-events.
                    schema:
                      type: string
                      enum:
                        - macro
                        - micro
                    example: micro
                  - $ref: ../../openapi.yaml#/components/parameters/DataSourcesParameter
                responses:
                  '200':
                    description: A time-ordered list of Action objects caused by the specified source. The list may be empty.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: ../../schemas/relationships/Action.yaml
                  '400':
                    $ref: ../../openapi.yaml#/components/responses/BadRequest
                  '401':
                    $ref: ../../openapi.yaml#/components/responses/Unauthorized
                  '403':
                    $ref: ../../openapi.yaml#/components/responses/Forbidden
                  '404':
                    $ref: ../../openapi.yaml#/components/responses/NotFound
            /query-actions:
              post:
                tags:
                  - Causal Analysis Actions
                summary: Queries for Action objects based on complex criteria including items, versions, types, and temporal filters.
                operationId: queryActions
                description: |
                  A powerful action to query and retrieve complete `Action` objects based on a variety of criteria, including affected items, produced versions, action types, and temporal validity.

                  This action enables efficient batch retrieval of actions across multiple items and versions, supporting complex impact analysis workflows without needing to call per-item endpoints repeatedly.

                  ### Filtering Logic

                  - **itemIds**: If provided, returns actions that affected any of the specified items
                  - **producesVersionIds**: If provided, returns actions that produced any of the specified versions
                  - **actionTypes**: If provided, filters to only actions of the specified types
                  - **timeInterval**: Filters actions by effective date. If only `startTime` is provided, returns all actions from that date onwards. If only `endTime` is provided, returns all actions up to that date.

                  When multiple filter types are provided, results are the **union** of all matching actions (OR logic).

                  ### Discussion

                  This action is essential for comprehensive impact analysis at scale. Rather than making individual `/items/{itemId}/history` or `/items/{sourceWorkId}/actions-caused` calls, a single `/query-actions` call can retrieve all relevant actions across multiple items and versions, dramatically improving efficiency for temporal and causal analysis workflows.
                security:
                  - ApiKeyAuth: []
                requestBody:
                  description: The criteria for the Action query.
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: '#/components/schemas/GetActionsRequest'
                responses:
                  '200':
                    description: A time-ordered list of Action objects matching the criteria. The list may be empty if no actions are found.
                    content:
                      application/json:
                        schema:
                          type: array
                          items:
                            $ref: '#/components/schemas/Action'
                  '400':
                    $ref: '#/components/responses/BadRequest'
                  '401':
                    $ref: '#/components/responses/Unauthorized'
                  '403':
                    $ref: '#/components/responses/Forbidden'
            /versions/compare:
