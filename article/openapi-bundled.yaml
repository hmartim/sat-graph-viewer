                summary: Gets all TextUnits for a Version, optionally filtered by language.
                operationId: getVersionTextUnits
                description: |
                  Deterministically retrieves all `TextUnit` objects associated with a single, known `Version`,
                  optionally filtered by language. Returns all aspects (canonical, summary, description, etc.)
                  available for that Version.

                  This is a direct-access, primary-key-based lookup, not a search operation.

                  ### Discussion
                  This action is fundamentally different from `searchTextUnits`. While the latter is a
                  probabilistic discovery tool, `getVersionTextUnits` is a deterministic fetch. It serves
                  the critical use case where an agent has already identified a specific `Version`
                  (e.g., via `getValidVersions`) and requires its complete textual content.
                security:
